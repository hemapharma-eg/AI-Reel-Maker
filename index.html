    // Utility: Convert raw PCM Base64 to WAV Blob
    function base64ToWav(base64, sampleRate = 24000) {
      const binaryString = atob(base64);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      const buffer = bytes.buffer; 

      const wavBuffer = new ArrayBuffer(44 + buffer.byteLength);
      const view = new DataView(wavBuffer);

      const writeString = (v, offset, string) => {
        for (let i = 0; i < string.length; i++) {
          v.setUint8(offset + i, string.charCodeAt(i));
        }
      };

      const numChannels = 1;
      const byteRate = sampleRate * numChannels * 2;
      const blockAlign = numChannels * 2;

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + buffer.byteLength, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, buffer.byteLength, true);

      new Uint8Array(wavBuffer, 44).set(new Uint8Array(buffer));
      return new Blob([wavBuffer], { type: 'audio/wav' });
    }

                'Cache-Control': 'no-cache, no-store',

              try { parsedError = JSON.parse(errorBody); } catch(e) { parsedError = null; }

              if (res.status === 429) {
                if (i === maxRetries - 1) {

                }
                const waitSec = Math.round(delay / 1000);
                setRefillTime(`Rate limited. Auto-retrying in ${waitSec}s... (${i + 1}/${maxRetries})`);

                delay *= 2;

            await new Promise(r => setTimeout(r, delay));
            delay *= 2;

        setSlides(prev => prev.map(s => s.id === slideId ? { ...s, [type]: (s[type] || []).map(o => o.id === overlayId ? { ...o, ...updates } : o) } : s));

      const removeOverlay = (slideId, type, overlayId) => {
        setSlides(prev => prev.map(s => s.id === slideId ? { ...s, [type]: (s[type] || []).filter(o => o.id !== overlayId) } : s));
      };

      const handleImageUpload = (id, e) => {
        const files = e.target.files;
        if (files && files.length > 0) {
          const file = files[0];
          const previewUrl = URL.createObjectURL(file);
          const slide = slides.find(s => s.id === id);
          if (slide && slide.imagePreviewUrl) URL.revokeObjectURL(slide.imagePreviewUrl);
          updateSlide(id, { imageFile: file, imagePreviewUrl: previewUrl });
        }
      };

      const handleBulkImageUpload = (e) => {
        const files = e.target.files ? Array.from(e.target.files) : [];
        if (files.length === 0) return;

        const currentNonEmptyCount = (slides.length === 1 && !slides[0].imageFile && !slides[0].script) ? 0 : slides.length;
        if (currentNonEmptyCount + files.length > 10) {
          alert(`You can only have up to 10 slides per project. Trying to add ${files.length} slides to your existing ${currentNonEmptyCount} slides exceeds the limit.`);
          if (fileInputRef.current) {
            fileInputRef.current.value = '';
          }
          return;
        }

        const newSlides = files.map((file, index) => ({
          id: Date.now() + index + Math.random(),
          imageFile: file,
          imagePreviewUrl: URL.createObjectURL(file),
          script: "",
          audioBlob: null,
          audioUrl: null,
          isGenerating: false,
          voice: globalVoice,
          isGeneratingScript: false,
          scriptGenerationProgress: "",
          texts: [],
          stickers: [],
          link: ""
        }));

        setSlides(prev => {
          if (prev.length === 1 && !prev[0].imageFile && !prev[0].script) {
            return newSlides;
          } else {
            return [...prev, ...newSlides];
          }
        });
        
        if (fileInputRef.current) {
          fileInputRef.current.value = '';
        }
      };

      const generateTTS = async (text, voiceName) => {
        // Official Gemini docs: TTS requires gemini-2.5-flash-preview-tts on v1beta
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?`;
        const payload = {
          contents: [{ parts: [{ text }] }],
          generationConfig: {
            responseModalities: ["AUDIO"],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: { voiceName }
              }
            }
          }
        };

        const data = await safeGeminiFetch(url, payload);
        const part = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
        if (!part) throw new Error("No audio data returned. Check if the text is valid.");

        const mimeType = part.mimeType || "audio/L16; rate=24000";
        const rateMatch = mimeType.match(/rate=(\d+)/);
        const rate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;

        return base64ToWav(part.data, rate);
      };

      const autoGenerateScript = async (id) => {
        const currentlyGeneratingCount = slides.filter(s => s.isGeneratingScript).length;
        if (currentlyGeneratingCount >= 3) {
          alert("You cannot generate more than 3 AI scripts at the same time. Please wait until at least one finishes.");
          return;
        }

        const slide = slides.find(s => s.id === id);
        if (!slide || !slide.imageFile) {
          alert("Please upload an image for this slide first.");
          return;
        }

        if (aiStatus !== 'ready' || !userApiKey) {
          alert("AI was skipped or no API key provided. Please reload the app to enter your key.");
          return;
        }

        updateSlide(id, { isGeneratingScript: true, scriptGenerationProgress: 'Analyzing Slide...' });

        try {
          const base64Image = await fileToBase64(slide.imageFile);
          setQuota(q => ({ ...q, used: q.used + 1, rpm: q.rpm + 1 }));
          
          // Use whichever model passed the startup diagnostic test
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${workingModel}:generateContent?`;
          console.log(`[SlideCaster] Script generation using model: ${workingModel}`);
          const payload = {
            contents: [{
              parts: [
                { text: "Act as an expert educator. Look at this presentation slide and provide a concise, high-impact explanation for students. Your explanation should be clear and professional. Aim for a script about 3-5 sentences long that covers the key concept shown. Return only the script text." },
                { inlineData: { mimeType: slide.imageFile.type, data: base64Image } }
              ]
            }]
          };

          const data = await safeGeminiFetch(url, payload);
          const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;

          if (generatedText) {
             updateSlide(id, { script: generatedText.trim(), isGeneratingScript: false, scriptGenerationProgress: '' });
          } else {
             throw new Error("No text generated by AI");
          }
        } catch (err) {
          console.error("Gemini AI Generation failed:", err);
          alert("Failed to auto-generate script. " + err.message);
          updateSlide(id, { isGeneratingScript: false, scriptGenerationProgress: '' });
        }
      };

      const generateAudioForSlide = async (id) => {
        const currentlyGeneratingVoiceCount = slides.filter(s => s.isGenerating).length;
        if (currentlyGeneratingVoiceCount >= 3) {
          alert("You cannot generate more than 3 voices at the same time. Please wait until at least one finishes.");
          return;
        }

        const slide = slides.find(s => s.id === id);
        if (!slide || !(slide.script || "").trim()) return;

        updateSlide(id, { isGenerating: true });
        try {
          setQuota(q => ({ ...q, used: q.used + 1, rpm: q.rpm + 1 }));
          if (aiStatus !== 'ready') throw new Error("AI Setup not completed.");
          const audioBlob = await generateTTS(slide.script, slide.voice);
          const audioUrl = URL.createObjectURL(audioBlob);
          updateSlide(id, { audioBlob, audioUrl, isGenerating: false });
        } catch (error) {
          console.error("Audio generation failed:", error);
          const maskedKey = userApiKey ? `${userApiKey.substring(0, 6)}...${userApiKey.slice(-4)}` : "None";
          updateSlide(id, { isGenerating: false });
          alert(`Failed to generate audio (Key: ${maskedKey}). ${error.message}`);
        }
      };

      const changeApiKey = async () => {
        const newKey = prompt("Enter your new Gemini API Key:", userApiKey);
        if (newKey !== null && newKey.trim() !== "") {
          const result = await validateAndTestKey(newKey.trim());
          if (!result.ok) {
            alert(`❌ New key failed at "${result.step}":\n\n${result.error}`);
            return;
          }
          setUserApiKey(newKey.trim());
          setWorkingModel(result.useModel);
          // Reset all stale state (Cause #6)
          setQuota({ used: 0, limit: 1500, rpm: 0 });
          setRefillTime(null);
          setAiStatus('ready');
          alert(`✅ API Key updated! Using model: ${result.useModel}`);
        }
      };

      const playAudio = (id, url) => {
        if (!url) return;
        
        if (activeAudio.id === id && activeAudio.audio) {
          if (activeAudio.isPlaying) {
            activeAudio.audio.pause();
            setActiveAudio(prev => ({ ...prev, isPlaying: false }));
          } else {
            activeAudio.audio.play();
            setActiveAudio(prev => ({ ...prev, isPlaying: true }));
          }
          return;
        }

        if (activeAudio.audio) {
          activeAudio.audio.pause();
          activeAudio.audio.currentTime = 0;
        }

        const audio = new Audio(url);
        audio.onended = () => setActiveAudio({ id: null, audio: null, isPlaying: false });
        audio.play();
        setActiveAudio({ id, audio, isPlaying: true });
      };

      const stopAudio = () => {
        if (activeAudio.audio) {
          activeAudio.audio.pause();
          activeAudio.audio.currentTime = 0;
        }
        setActiveAudio({ id: null, audio: null, isPlaying: false });
      };

      const toggleMusicPreview = () => {
        if (musicPreviewAudio) {
          musicPreviewAudio.pause();
          musicPreviewAudio.currentTime = 0;
          setMusicPreviewAudio(null);
          return;
        }
        if (!backgroundMusic) return;
        const audio = new Audio(backgroundMusic);
        audio.onended = () => setMusicPreviewAudio(null);
        audio.onerror = () => { alert("Could not load this music track for preview."); setMusicPreviewAudio(null); };
        audio.play();
        setMusicPreviewAudio(audio);
      };

      // --- Image Editor Modal with Drag Support ---
      const ImageEditorModal = ({ slide, onClose }) => {
        const containerRef = useRef(null);
        const [localTexts, setLocalTexts] = useState([...(slide.texts || [])]);
        const [localStickers, setLocalStickers] = useState([...(slide.stickers || [])]);
        const [selectedOverlay, setSelectedOverlay] = useState(null); // { type: 'texts'|'stickers', id }
        const [dragging, setDragging] = useState(null); // { type, id, offsetX, offsetY }

        const handlePointerDown = (e, type, id) => {
          e.preventDefault();
          setSelectedOverlay({ type, id });
          const rect = containerRef.current.getBoundingClientRect();
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          const items = type === 'texts' ? localTexts : localStickers;
          const item = items.find(i => i.id === id);
          if (!item) return;
          const itemPxX = (item.x / 100) * rect.width;
          const itemPxY = (item.y / 100) * rect.height;
          setDragging({ type, id, offsetX: clientX - rect.left - itemPxX, offsetY: clientY - rect.top - itemPxY });
        };

        const handlePointerMove = (e) => {
          if (!dragging || !containerRef.current) return;
          e.preventDefault();
          const rect = containerRef.current.getBoundingClientRect();
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          const newX = Math.max(0, Math.min(100, ((clientX - rect.left - dragging.offsetX) / rect.width) * 100));
          const newY = Math.max(0, Math.min(100, ((clientY - rect.top - dragging.offsetY) / rect.height) * 100));
          if (dragging.type === 'texts') {
            setLocalTexts(prev => prev.map(t => t.id === dragging.id ? { ...t, x: Math.round(newX), y: Math.round(newY) } : t));
          } else {
            setLocalStickers(prev => prev.map(s => s.id === dragging.id ? { ...s, x: Math.round(newX), y: Math.round(newY) } : s));
          }
        };

        const handlePointerUp = () => setDragging(null);

        const handleSave = () => {
          updateSlide(slide.id, { texts: localTexts, stickers: localStickers });
          onClose();
        };

        const selectedText = selectedOverlay?.type === 'texts' ? localTexts.find(t => t.id === selectedOverlay.id) : null;
        const selectedSticker = selectedOverlay?.type === 'stickers' ? localStickers.find(s => s.id === selectedOverlay.id) : null;

        return (
          <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4"
            onMouseMove={handlePointerMove} onMouseUp={handlePointerUp}
            onTouchMove={handlePointerMove} onTouchEnd={handlePointerUp}
            onClick={() => setSelectedOverlay(null)}>
            <div className="bg-white rounded-3xl max-w-5xl w-full shadow-2xl overflow-hidden flex flex-col max-h-[95vh]" onClick={(e) => e.stopPropagation()}>
              <div className="p-4 border-b border-slate-100 flex justify-between items-center flex-shrink-0">
                <h2 className="text-lg font-bold text-slate-900">Edit Image Overlays</h2>
                <div className="flex gap-2">
                  <button onClick={() => { const newId = Date.now(); setLocalTexts(prev => [...prev, { id: newId, text: "New Text", x: 50, y: 50, font: "Inter", fontSize: 40, color: "#ffffff" }]); setSelectedOverlay({ type: 'texts', id: newId }); }} className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg font-medium">+ Text</button>
                  <div className="relative group/stk">
                    <button className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg font-medium">+ Sticker</button>
                    <div className="absolute bottom-full right-0 mb-2 hidden group-hover/stk:grid grid-cols-5 gap-1 p-2 bg-white border border-slate-200 rounded-lg shadow-xl w-[200px] z-20">
                      {STICKER_LIBRARY.map(emoji => (
                        <button key={emoji} onClick={(ev) => { ev.stopPropagation(); const newId = Date.now() + Math.random(); setLocalStickers(prev => [...prev, { id: newId, emoji, x: 50, y: 50, size: 60 }]); setSelectedOverlay({ type: 'stickers', id: newId }); }} className="text-xl hover:bg-slate-100 p-1 rounded transition-colors">{emoji}</button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
              <div className="flex flex-1 overflow-hidden">
                <div className="flex-1 bg-slate-900 p-4 flex justify-center items-center overflow-auto">
                  <div ref={containerRef} className="relative inline-block select-none" style={{ maxHeight: '60vh' }}>
                    <img src={slide.imagePreviewUrl} alt="Slide" className="max-h-[60vh] max-w-full rounded-lg" draggable={false} />
                    {localTexts.map(txt => (
                      <div key={txt.id} style={{ position: 'absolute', left: `${txt.x}%`, top: `${txt.y}%`, transform: 'translate(-50%, -50%)', fontSize: `${txt.fontSize}px`, fontFamily: `"${txt.font}", sans-serif`, color: txt.color, fontWeight: 'bold', cursor: 'grab', textShadow: '1px 1px 4px rgba(0,0,0,0.7)', userSelect: 'none', whiteSpace: 'nowrap', outline: selectedOverlay?.type === 'texts' && selectedOverlay?.id === txt.id ? '2px solid #818cf8' : 'none', borderRadius: '4px' }}
                        onMouseDown={(ev) => handlePointerDown(ev, 'texts', txt.id)}
                        onTouchStart={(ev) => handlePointerDown(ev, 'texts', txt.id)}>
                        {txt.text}
                        <button onClick={(ev) => { ev.stopPropagation(); setLocalTexts(prev => prev.filter(t => t.id !== txt.id)); if (selectedOverlay?.id === txt.id) setSelectedOverlay(null); }} className="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[8px] hover:bg-rose-600" style={{cursor:'pointer'}}>✕</button>
                      </div>
                    ))}
                    {localStickers.map(stk => (
                      <div key={stk.id} style={{ position: 'absolute', left: `${stk.x}%`, top: `${stk.y}%`, transform: 'translate(-50%, -50%)', fontSize: `${stk.size}px`, cursor: 'grab', userSelect: 'none', outline: selectedOverlay?.type === 'stickers' && selectedOverlay?.id === stk.id ? '2px solid #818cf8' : 'none', borderRadius: '4px' }}
                        onMouseDown={(ev) => handlePointerDown(ev, 'stickers', stk.id)}
                        onTouchStart={(ev) => handlePointerDown(ev, 'stickers', stk.id)}>
                        {stk.emoji}
                        <button onClick={(ev) => { ev.stopPropagation(); setLocalStickers(prev => prev.filter(s => s.id !== stk.id)); if (selectedOverlay?.id === stk.id) setSelectedOverlay(null); }} className="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[8px] hover:bg-rose-600" style={{cursor:'pointer'}}>✕</button>
                      </div>
                    ))}
                  </div>
                </div>
                {/* Properties Panel */}
                <div className="w-64 bg-slate-50 border-l border-slate-200 p-4 overflow-y-auto flex-shrink-0">
                  <h3 className="text-sm font-bold text-slate-700 mb-3">Properties</h3>
                  {selectedText && (
                    <div className="space-y-3">
                      <div>
                        <label className="text-xs font-semibold text-slate-500 block mb-1">Text Content</label>
                        <input type="text" value={selectedText.text} onChange={e => setLocalTexts(prev => prev.map(t => t.id === selectedText.id ? { ...t, text: e.target.value } : t))} className="w-full px-2 py-1.5 text-sm border border-slate-200 rounded-lg" />
                      </div>
                      <div>
                        <label className="text-xs font-semibold text-slate-500 block mb-1">Font</label>
                        <select value={selectedText.font} onChange={e => setLocalTexts(prev => prev.map(t => t.id === selectedText.id ? { ...t, font: e.target.value } : t))} className="w-full px-2 py-1.5 text-sm border border-slate-200 rounded-lg">
                          {FONT_LIBRARY.map(f => <option key={f} value={f}>{f}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-xs font-semibold text-slate-500 block mb-1">Font Size: {selectedText.fontSize}px</label>
                        <input type="range" min="12" max="120" value={selectedText.fontSize} onChange={e => setLocalTexts(prev => prev.map(t => t.id === selectedText.id ? { ...t, fontSize: parseInt(e.target.value) } : t))} className="w-full accent-indigo-600" />
                      </div>
                      <div>
                        <label className="text-xs font-semibold text-slate-500 block mb-1">Color</label>
                        <input type="color" value={selectedText.color} onChange={e => setLocalTexts(prev => prev.map(t => t.id === selectedText.id ? { ...t, color: e.target.value } : t))} className="w-full h-8 rounded cursor-pointer" />
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <div>
                          <label className="text-xs font-semibold text-slate-500 block mb-1">X: {selectedText.x}%</label>
                          <input type="range" min="0" max="100" value={selectedText.x} onChange={e => setLocalTexts(prev => prev.map(t => t.id === selectedText.id ? { ...t, x: parseInt(e.target.value) } : t))} className="w-full accent-indigo-600" />
                        </div>
                        <div>
                          <label className="text-xs font-semibold text-slate-500 block mb-1">Y: {selectedText.y}%</label>
                          <input type="range" min="0" max="100" value={selectedText.y} onChange={e => setLocalTexts(prev => prev.map(t => t.id === selectedText.id ? { ...t, y: parseInt(e.target.value) } : t))} className="w-full accent-indigo-600" />
                        </div>
                      </div>
                    </div>
                  )}
                  {selectedSticker && (
                    <div className="space-y-3">
                      <div className="text-center text-4xl">{selectedSticker.emoji}</div>
                      <div>
                        <label className="text-xs font-semibold text-slate-500 block mb-1">Size: {selectedSticker.size}px</label>
                        <input type="range" min="20" max="200" value={selectedSticker.size} onChange={e => setLocalStickers(prev => prev.map(s => s.id === selectedSticker.id ? { ...s, size: parseInt(e.target.value) } : s))} className="w-full accent-indigo-600" />
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <div>
                          <label className="text-xs font-semibold text-slate-500 block mb-1">X: {selectedSticker.x}%</label>
                          <input type="range" min="0" max="100" value={selectedSticker.x} onChange={e => setLocalStickers(prev => prev.map(s => s.id === selectedSticker.id ? { ...s, x: parseInt(e.target.value) } : s))} className="w-full accent-indigo-600" />
                        </div>
                        <div>
                          <label className="text-xs font-semibold text-slate-500 block mb-1">Y: {selectedSticker.y}%</label>
                          <input type="range" min="0" max="100" value={selectedSticker.y} onChange={e => setLocalStickers(prev => prev.map(s => s.id === selectedSticker.id ? { ...s, y: parseInt(e.target.value) } : s))} className="w-full accent-indigo-600" />
                        </div>
                      </div>
                    </div>
                  )}
                  {!selectedText && !selectedSticker && (
                    <p className="text-xs text-slate-400 italic">Click on a text or sticker overlay to edit its properties.</p>
                  )}
                </div>
              </div>
              <div className="p-4 flex justify-end gap-3 bg-slate-50 border-t border-slate-100 flex-shrink-0">
                <button onClick={onClose} className="px-5 py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-200 transition-all">Cancel</button>
                <button onClick={handleSave} className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-xl shadow-md transition-all">Save & Close</button>
              </div>
            </div>
          </div>
        );
      };

      const isProjectNameValid = () => projectName.trim() && projectName !== "Untitled Project";

      const saveProject = async () => {
        if (!isProjectNameValid()) {
          alert("Please give your project a clear and unique name before saving.");
          return;
        }
        try {
          const exportData = {
            projectName,
            globalVoice,
            slides: await Promise.all(slides.map(async s => {
              let base64 = null;
              if (s.imageFile) base64 = await fileToBase64(s.imageFile);
              return {
                id: s.id,
                script: s.script,
                voice: s.voice,
                imageName: s.imageFile ? s.imageFile.name : null,
                imageType: s.imageFile ? s.imageFile.type : null,
                base64
              };
            }))
          };
          const blob = new Blob([JSON.stringify(exportData)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${projectName.replace(/\s+/g, '_')}.json`;
          a.click();
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error("Save failed:", err);
          alert("Failed to save project.");
        }
      };

      const loadProject = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          
          if (!data.projectName || data.projectName === "Untitled Project") {
             alert("The uploaded file does not have a valid project name.");
             e.target.value = '';
             return;
          }

          setProjectName(data.projectName);
          setGlobalVoice(data.globalVoice || "Kore");
          
          const restoredSlides = await Promise.all(data.slides.map(async s => {
            let imageFile = null;
            let imagePreviewUrl = null;
            if (s.base64) {
              const dataUrl = `data:${s.imageType || 'image/png'};base64,${s.base64}`;
              const res = await fetch(dataUrl);
              const blob = await res.blob();
              imageFile = new File([blob], s.imageName || 'image.png', { type: s.imageType || 'image/png' });
              imagePreviewUrl = URL.createObjectURL(imageFile);
            }
            return {
              id: s.id || Date.now() + Math.random(),
              imageFile,
              imagePreviewUrl,
              script: s.script || "",
              voice: s.voice || data.globalVoice || "Kore",
              audioBlob: null, audioUrl: null,
              isGenerating: false, isGeneratingScript: false, scriptGenerationProgress: ""
            };
          }));
          setSlides(restoredSlides);
          alert("Project loaded successfully.");
        } catch (err) {
          console.error("Load failed:", err);
          alert("Failed to load project file.");
        }
        e.target.value = '';
      };

      const previewGlobalVoice = async () => {
        if (isPreviewingVoice) return;
        setIsPreviewingVoice(true);
        try {
          setQuota(q => ({ ...q, used: q.used + 1, rpm: q.rpm + 1 }));
          const sampleText = "Hello! This is a sample of the voice you have selected for your SlideCaster project.";
          const audioBlob = await generateTTS(sampleText, globalVoice);
          const audioUrl = URL.createObjectURL(audioBlob);
          const audio = new Audio(audioUrl);
          audio.onended = () => {
            setIsPreviewingVoice(false);
            URL.revokeObjectURL(audioUrl);
          };
          audio.play();
        } catch (err) {
          console.error("Preview failed:", err);
          setIsPreviewingVoice(false);
          alert("Preview failed: " + err.message);
        }
      };

      const compileVideo = async () => {
        if (slides.length === 0) return;
        setIsCompiling(true);
        setCompilationProgress("Initializing canvas...");

        try {
          const canvas = document.createElement('canvas');
          canvas.width = layout === '16:9' ? 1280 : 720;
          canvas.height = layout === '16:9' ? 720 : 1280;
          const ctx = canvas.getContext('2d');

          const getStream = canvas.captureStream || canvas.mozCaptureStream;
          if (!getStream) throw new Error("Canvas video export not supported.");
          
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          const audioCtx = new AudioContextClass({ sampleRate: 44100 });
          const dest = audioCtx.createMediaStreamDestination();

          const voiceGain = audioCtx.createGain();
          voiceGain.gain.value = voiceVolume;
          voiceGain.connect(dest);

          let musicSourceRef = null;
          if (backgroundMusic) {
            try {
              setCompilationProgress("Loading background music...");
              const res = await fetch(backgroundMusic);
              if (!res.ok) throw new Error(`Music fetch failed: HTTP ${res.status}`);
              const ab = await res.arrayBuffer();
              const musicBuffer = await audioCtx.decodeAudioData(ab);
              const musicSource = audioCtx.createBufferSource();
              musicSource.buffer = musicBuffer;
              musicSource.loop = true;
              
              const bgGain = audioCtx.createGain();
              bgGain.gain.value = musicVolume;
              musicSource.connect(bgGain);
              bgGain.connect(dest);
              musicSource.start(0);
              musicSourceRef = musicSource;
              console.log("[ReelMaker] Background music loaded and playing.");
            } catch(e) {
              console.error("Could not load bg music:", e);
              alert("Warning: Background music could not be loaded (" + e.message + "). The video will compile without music.");
            }
          }

          const canvasStream = getStream.call(canvas, 30); 
          
          const Mp4Muxer = window.Mp4Muxer;
          if (!Mp4Muxer) throw new Error("MP4 Muxer library not loaded.");

          let muxer = new Mp4Muxer.Muxer({
            target: new Mp4Muxer.ArrayBufferTarget(),
            video: { codec: 'avc', width: canvas.width, height: canvas.height },
            audio: { codec: 'aac', sampleRate: 44100, numberOfChannels: 1 },
            fastStart: 'in-memory'
          });

          let baseTimeVideo = null;
          const videoEncoder = new VideoEncoder({
            output: (chunk, meta) => {
              if (baseTimeVideo === null) baseTimeVideo = chunk.timestamp;
              const buffer = new ArrayBuffer(chunk.byteLength);
              chunk.copyTo(buffer);
              const newChunk = new EncodedVideoChunk({
                type: chunk.type,
                timestamp: chunk.timestamp - baseTimeVideo,
                duration: chunk.duration,
                data: buffer
              });
              muxer.addVideoChunk(newChunk, meta);
            },
            error: e => console.error(e)
          });
          videoEncoder.configure({
            codec: 'avc1.42001f', // Baseline profile level 3.1
            width: canvas.width,
            height: canvas.height,
            bitrate: 2_500_000,
            framerate: 30
          });

          let baseTimeAudio = null;
          const audioEncoder = new AudioEncoder({
            output: (chunk, meta) => {
              if (baseTimeAudio === null) baseTimeAudio = chunk.timestamp;
              const buffer = new ArrayBuffer(chunk.byteLength);
              chunk.copyTo(buffer);
              const newChunk = new EncodedAudioChunk({
                type: chunk.type,
                timestamp: chunk.timestamp - baseTimeAudio,
                duration: chunk.duration,
                data: buffer
              });
              muxer.addAudioChunk(newChunk, meta);
            },
            error: e => console.error(e)
          });

          const videoTrack = canvasStream.getVideoTracks()[0];
          const audioTrack = dest.stream.getAudioTracks()[0];
          const audioSettings = audioTrack.getSettings();

          audioEncoder.configure({
            codec: 'mp4a.40.2', // AAC-LC
            sampleRate: audioSettings.sampleRate || 44100,
            numberOfChannels: audioSettings.channelCount || 1,
            bitrate: 128000
          });

          const videoProcessor = new MediaStreamTrackProcessor({ track: videoTrack });
          const videoReader = videoProcessor.readable.getReader();

          const audioProcessor = new MediaStreamTrackProcessor({ track: audioTrack });
          const audioReader = audioProcessor.readable.getReader();

          let isRecording = true;
          let vFrameCount = 0;
          
          const readVideo = async () => {
            try {
              while (isRecording) {
                const { done, value } = await videoReader.read();
                if (done) break;
                if (value) {
                  if (videoEncoder.state === "configured") {
                    videoEncoder.encode(value, { keyFrame: vFrameCount % 60 === 0 });
                    vFrameCount++;
                  }
                  value.close();
                }
              }
            } catch (e) {
              console.error("Video reader loop stopped", e);
            }
          };

          const readAudio = async () => {
            try {
              while (isRecording) {
                const { done, value } = await audioReader.read();
                if (done) break;
                if (value) {
                  if (audioEncoder.state === "configured") {
                    audioEncoder.encode(value);
                  }
                  value.close();
                }
              }
            } catch (e) {
              console.error("Audio reader loop stopped", e);
            }
          };

          // Start reading stream frames immediately
          const p1 = readVideo();
          const p2 = readAudio();
          
          if (audioCtx.state === 'suspended') await audioCtx.resume();

          let currentSlideVisual = null;
          let previousSlideVisual = null;
          let transitionStartTime = null;

          const renderLoop = () => {
            if (!isRecording) return;
            ctx.fillStyle = '#000000'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const drawVisual = (visual, xOffset = 0, alpha = 1) => {
              if (!visual) return;
              ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
              if (visual.img) {
                const img = visual.img;
                const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
                const w = img.width * scale;
                const h = img.height * scale;
                ctx.drawImage(img, xOffset + (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
              }

              (visual.stickers || []).forEach(stk => {
                ctx.font = `${stk.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const sx = xOffset + (stk.x / 100) * canvas.width;
                const sy = (stk.y / 100) * canvas.height;
                ctx.fillText(stk.emoji, sx, sy);
              });

              (visual.texts || []).forEach(txt => {
                ctx.font = `bold ${txt.fontSize}px "${txt.font}", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = txt.color;
                const tx = xOffset + (txt.x / 100) * canvas.width;
                const ty = (txt.y / 100) * canvas.height;
                ctx.fillText(txt.text, tx, ty);
              });

              // Render link text at the bottom of the frame
              if (visual.link) {
                ctx.font = 'bold 20px "Inter", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = '#60a5fa';
                const linkY = canvas.height - 20;
                const linkX = xOffset + canvas.width / 2;
                // Draw background pill
                const linkText = '🔗 ' + visual.link;
                const metrics = ctx.measureText(linkText);
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath();
                const pillW = metrics.width + 24;
                const pillH = 32;
                const pillX = linkX - pillW / 2;
                const pillY = linkY - pillH + 4;
                ctx.roundRect(pillX, pillY, pillW, pillH, 8);
                ctx.fill();
                ctx.fillStyle = '#93c5fd';
                ctx.fillText(linkText, linkX, linkY);
              }
              ctx.globalAlpha = 1.0;
            };

            const now = performance.now();
            let transitionProgress = 0;
            const transitionDuration = 800; // ms transition length

            if (transitionType !== 'none' && previousSlideVisual && transitionStartTime) {
               transitionProgress = (now - transitionStartTime) / transitionDuration;
               if (transitionProgress >= 1) previousSlideVisual = null;
            } else {
               previousSlideVisual = null;
            }

            if (previousSlideVisual) {
              if (transitionType === 'fade') {
                drawVisual(previousSlideVisual, 0, 1 - transitionProgress);
                drawVisual(currentSlideVisual, 0, transitionProgress);
              } else if (transitionType === 'slide-left') {
                const xOffsetPrev = -(transitionProgress * canvas.width);
                const xOffsetCurr = canvas.width - (transitionProgress * canvas.width);
                drawVisual(previousSlideVisual, xOffsetPrev, 1);
                drawVisual(currentSlideVisual, xOffsetCurr, 1);
              }
            } else {
              drawVisual(currentSlideVisual, 0, 1);
            }

            requestAnimationFrame(renderLoop);
          };
          
          requestAnimationFrame(renderLoop);

          for (let i = 0; i < slides.length; i++) {
            const slide = slides[i];
            setCompilationProgress(`Slide ${i + 1} / ${slides.length}...`);
            
            const sentenceRegex = /[^.!?]+[.!?]+|\s*$/g;
            const sentences = (slide.script ? slide.script.match(sentenceRegex) || [slide.script] : []);

            let slideImg = null;
            if (slide.imagePreviewUrl) {
              slideImg = new Image();
              slideImg.src = slide.imagePreviewUrl;
              await new Promise(r => { slideImg.onload = r; slideImg.onerror = r; });
            }

            let audioDurationMs = 3000; 
            let audioBuffer = null;
            if (slide.audioBlob) {
              try {
                const arrayBuffer = await slide.audioBlob.arrayBuffer();
                audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                audioDurationMs = audioBuffer.duration * 1000;
              } catch (e) {}
            } else if (slide.script) {
              audioDurationMs = Math.max(3000, slide.script.length * 70);
            }

            previousSlideVisual = currentSlideVisual;
            if (previousSlideVisual) transitionStartTime = performance.now();

            currentSlideVisual = { 
              img: slideImg, sentences, 
              duration: audioDurationMs, nowAtStart: performance.now(),
              texts: slide.texts || [], stickers: slide.stickers || [],
              link: slide.link || ''
            };

            if (audioBuffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(voiceGain);
                source.start();
                await new Promise(r => { source.onended = r; });
            } else {
                await new Promise(r => setTimeout(r, audioDurationMs));
            }
            
            // tiny buffer between slides
            await new Promise(r => setTimeout(r, 200));
          }

          setCompilationProgress("Saving video...");
          await new Promise(r => setTimeout(r, 500)); 
          
          // Stop stream capture
          isRecording = false; 
          if (musicSourceRef) musicSourceRef.stop();
          videoTrack.stop();
          audioTrack.stop();

          // Wait for the reader loops to finish to prevent encoding after flush
          await Promise.all([p1, p2]);

          // Wait for encoders and muxer
          await Promise.all([videoEncoder.flush(), audioEncoder.flush()]);
          muxer.finalize();
          
          let finalBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });

          setFinalExtension('mp4');
          setFinalVideoUrl(URL.createObjectURL(finalBlob));
          if (audioCtx.state !== 'closed') await audioCtx.close();

        } catch (err) {
          console.error(err);
          alert("Compilation failed.");
        } finally {
          setIsCompiling(false);
          setCompilationProgress("");
        }
      };

                      </label>
                    )}
                    <div className="absolute top-3 left-3 bg-white/90 text-slate-700 text-xs font-bold px-2 py-1 rounded shadow-sm border border-slate-200/50">{index + 1}</div>
                  </div>

                  <div className="p-5 flex-1 flex flex-col">
                    <div className="flex justify-between items-center mb-2">
                      <label className="text-sm font-semibold text-slate-700 flex items-center gap-2"><MicIcon className="w-4 h-4 text-slate-400" /> Voiceover Script</label>
                      <div className="flex items-center gap-2">
                        <button onClick={() => autoGenerateScript(slide.id)} disabled={!slide.imagePreviewUrl || slide.isGeneratingScript || aiStatus !== 'ready'} className="text-xs font-medium bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-3 py-1.5 rounded-md flex items-center gap-1.5 transition-colors disabled:opacity-50">
                          {slide.isGeneratingScript ? <><LoaderIcon className="w-3 h-3 animate-spin"/> {slide.scriptGenerationProgress}</> : <><SparklesIcon className="w-3 h-3"/> AI Script</>}
                        </button>
                        <button onClick={() => handleRemoveSlide(slide.id)} className="text-slate-400 hover:text-red-500 transition-colors p-1"><TrashIcon className="w-4 h-4"/></button>
                      </div>
                    </div>
                    <textarea value={slide.script} onChange={(e) => updateSlide(slide.id, { script: e.target.value })} className="w-full flex-1 min-h-[100px] bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-400" placeholder="Type the script here..."/>
                    
                    <div className="mt-4 pt-4 border-t border-slate-100">
                      <div className="flex items-center justify-between mb-3">
                        <label className="text-sm font-semibold text-slate-700">Image Overlays</label>
                        <div className="flex gap-2">
                          <button onClick={() => addTextToSlide(slide.id)} className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-medium">+ Text</button>
                          <div className="relative group/sticker">
                            <button className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-medium">+ Sticker</button>
                            <div className="absolute bottom-full right-0 mb-2 hidden group-hover/sticker:grid grid-cols-5 gap-1 p-2 bg-white border border-slate-200 rounded-lg shadow-xl w-[200px] z-20">
                              {STICKER_LIBRARY.map(emoji => (
                                <button key={emoji} onClick={(e) => { e.stopPropagation(); addStickerToSlide(slide.id, emoji); }} className="text-xl hover:bg-slate-100 p-1 rounded transition-colors">{emoji}</button>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                      <div className="space-y-2 max-h-[150px] overflow-y-auto">
                        {(slide.texts || []).map(txt => (
                          <div key={txt.id} className="bg-slate-50 p-2 rounded-lg border border-slate-200 text-xs flex flex-wrap gap-2 items-center">
                            <span className="font-bold text-slate-400">T</span>
                            <input type="text" value={txt.text} onChange={e => updateOverlay(slide.id, 'texts', txt.id, { text: e.target.value })} className="flex-1 min-w-[80px] px-1.5 py-1 border border-slate-200 rounded text-slate-800" />
                            <input type="color" value={txt.color} onChange={e => updateOverlay(slide.id, 'texts', txt.id, { color: e.target.value })} className="w-6 h-6 p-0 border-0 rounded cursor-pointer" title="Color" />
                            <select value={txt.font} onChange={e => updateOverlay(slide.id, 'texts', txt.id, { font: e.target.value })} className="px-1 py-1 border border-slate-200 rounded text-slate-700 max-w-[80px]">
                              {FONT_LIBRARY.map(f => <option key={f} value={f}>{f}</option>)}
                            </select>
                            <label className="flex items-center gap-1 text-slate-500">px:<input type="number" value={txt.fontSize} onChange={e => updateOverlay(slide.id, 'texts', txt.id, { fontSize: parseInt(e.target.value)||20 })} className="w-12 px-1 py-1 border border-slate-200 rounded text-slate-800"/></label>
                            <label className="flex items-center gap-1 text-slate-500" title="Horizontal Position">X%:<input type="range" min="0" max="100" value={txt.x} onChange={e => updateOverlay(slide.id, 'texts', txt.id, { x: parseInt(e.target.value) })} className="w-12 accent-indigo-500"/></label>
                            <label className="flex items-center gap-1 text-slate-500" title="Vertical Position">Y%:<input type="range" min="0" max="100" value={txt.y} onChange={e => updateOverlay(slide.id, 'texts', txt.id, { y: parseInt(e.target.value) })} className="w-12 accent-indigo-500"/></label>
                            <button onClick={() => removeOverlay(slide.id, 'texts', txt.id)} className="text-rose-500 hover:bg-rose-50 p-1 rounded ml-auto flex-shrink-0"><XIcon className="w-3 h-3"/></button>
                          </div>
                        ))}
                        {(slide.stickers || []).map(stk => (
                          <div key={stk.id} className="bg-slate-50 p-2 rounded-lg border border-slate-200 text-xs flex flex-wrap gap-2 items-center">
                            <span className="text-base">{stk.emoji}</span>
                            <label className="flex items-center gap-1 text-slate-500">Size:<input type="number" value={stk.size} onChange={e => updateOverlay(slide.id, 'stickers', stk.id, { size: parseInt(e.target.value)||40 })} className="w-12 px-1 py-1 border border-slate-200 rounded text-slate-800"/></label>
                            <label className="flex items-center gap-1 text-slate-500" title="Horizontal Position">X%:<input type="range" min="0" max="100" value={stk.x} onChange={e => updateOverlay(slide.id, 'stickers', stk.id, { x: parseInt(e.target.value) })} className="w-16 accent-indigo-500"/></label>
                            <label className="flex items-center gap-1 text-slate-500" title="Vertical Position">Y%:<input type="range" min="0" max="100" value={stk.y} onChange={e => updateOverlay(slide.id, 'stickers', stk.id, { y: parseInt(e.target.value) })} className="w-16 accent-indigo-500"/></label>
                            <button onClick={() => removeOverlay(slide.id, 'stickers', stk.id)} className="text-rose-500 hover:bg-rose-50 p-1 rounded ml-auto flex-shrink-0"><XIcon className="w-3 h-3"/></button>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="mt-4 pt-4 border-t border-slate-100">
                      <label className="text-sm font-semibold text-slate-700 flex items-center gap-2 mb-2">🔗 Clickable Link</label>
                      <input type="url" value={slide.link || ''} onChange={e => updateSlide(slide.id, { link: e.target.value })} placeholder="https://example.com (shown on video frame)" className="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-400" />
                    </div>

                    <div className="mt-4 flex flex-wrap items-center justify-between gap-4 border-t border-slate-100 pt-4">
                      <select value={slide.voice} onChange={(e) => updateSlide(slide.id, { voice: e.target.value })} className="text-sm bg-white border border-slate-200 rounded-lg px-2 py-1.5 outline-none focus:ring-2 focus:ring-indigo-500">
                        {VOICES.map(v => <option key={v} value={v}>{v}</option>)}
                      </select>
                      <div className="flex items-center gap-2">
                        {slide.audioUrl && (
                          <div className="flex items-center bg-slate-100 rounded-full px-1 py-1 gap-1">
                            <button onClick={() => playAudio(slide.id, slide.audioUrl)} className={`w-8 h-8 flex items-center justify-center rounded-full ${activeAudio.id === slide.id && activeAudio.isPlaying ? 'bg-indigo-600 text-white' : 'bg-white text-slate-700 border border-slate-200'} hover:scale-105 transition-all`}>
                              {activeAudio.id === slide.id && activeAudio.isPlaying ? <XIcon className="w-4 h-4"/> : <PlayIcon className="w-3.5 h-3.5 ml-0.5"/>}
                            </button>
                            {(activeAudio.id === slide.id) && (
                              <button onClick={stopAudio} className="w-8 h-8 flex items-center justify-center rounded-full bg-white text-rose-500 border border-slate-200 hover:scale-105 transition-all">
                                <div className="w-2.5 h-2.5 bg-rose-500 rounded-sm"></div>
                              </button>
                            )}
                          </div>
                        )}
                        <button onClick={() => generateAudioForSlide(slide.id)} disabled={!(slide.script || "").trim() || slide.isGenerating} className="bg-slate-900 hover:bg-slate-800 disabled:bg-slate-200 disabled:text-slate-400 text-white text-sm font-medium px-4 py-2 rounded-lg transition-all flex items-center gap-2">
                          {slide.isGenerating ? <><LoaderIcon className="w-4 h-4 animate-spin"/> Generating...</> : <><MicIcon className="w-4 h-4"/> Generate Voice</>}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
              <button onClick={handleAddSlide} className="w-full py-4 border-2 border-dashed border-slate-300 rounded-2xl text-slate-500 font-medium flex items-center justify-center gap-2 hover:bg-slate-50 hover:border-indigo-400 hover:text-indigo-600 transition-all">
                <PlusIcon className="w-5 h-5"/> Add Another Image
              </button>
            </div>
          </main>

          <footer className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-lg z-20">
            <div className="max-w-5xl mx-auto flex items-center justify-between gap-4">
              <div className="flex flex-col">
                <div className="text-sm text-slate-500 font-medium">Total Images: <span className="text-slate-900">{slides.length}</span><span className="text-slate-400"> / 10</span></div>
                {!slides.every(s => s.audioUrl) && <div className="text-[10px] text-rose-500 font-semibold animate-pulse uppercase tracking-wider">Generate all voices to compile</div>}
              </div>
              <div className="flex flex-col items-end">
                <span className="text-xs text-slate-500 mb-1 font-medium">Note: Compilation may take up to 1 minute per slide.</span>
                <button 
                  onClick={compileVideo} 
                  disabled={isCompiling || slides.length === 0 || !slides.every(s => s.audioUrl)} 
                  className="bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 disabled:from-slate-200 disabled:to-slate-200 disabled:text-slate-400 text-white font-semibold px-8 py-3 rounded-xl shadow-lg transition-all flex items-center gap-2 group"
                >
                  {isCompiling ? <><LoaderIcon className="w-5 h-5 animate-spin"/> {compilationProgress}</> : <><VideoIcon className="w-5 h-5 group-hover:scale-110 transition-transform"/> Compile Video</>}
                </button>
              </div>
            </div>
          </footer>

          {finalVideoUrl && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
              <div className="bg-white rounded-3xl max-w-4xl w-full shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className="p-6 border-b border-slate-100 flex justify-between items-center text-slate-900">
                  <h2 className="text-2xl font-bold">Your Video is Ready!</h2>
                  <button onClick={() => setFinalVideoUrl(null)} className="text-slate-400 hover:text-slate-600 p-2"><XIcon className="w-5 h-5"/></button>
                </div>
                <div className="bg-slate-100 p-6 flex justify-center">
                  <video 
                    key={finalVideoUrl}
                    src={finalVideoUrl} 
                    controls 
                    autoPlay
                    playsInline
                    className="max-h-[50vh] rounded-xl shadow-md bg-black"
                  />
                </div>
                <div className="p-6 flex justify-end gap-3 bg-slate-50 border-t border-slate-100">
                  <button onClick={() => setFinalVideoUrl(null)} className="px-5 py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-200 transition-all">Back to Editor</button>
                  <a href={finalVideoUrl} download={`${projectName.replace(/\s+/g, '_')}_Video.mp4`} className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-xl flex items-center gap-2 shadow-md transition-all"><DownloadIcon className="w-5 h-5"/> Download Video</a>
                </div>
              </div>
            </div>
          )}

          {expandedSlideId && slides.find(s => s.id === expandedSlideId)?.imagePreviewUrl && (
            <ImageEditorModal 
              slide={slides.find(s => s.id === expandedSlideId)} 
              onClose={() => setExpandedSlideId(null)} 
            />
          )}
          <div className="h-24"></div> 
        </div>
      );
    }

    class AppErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-10 bg-red-50 text-red-900 h-screen font-sans">
              <h1 className="text-2xl font-bold">Application Crash Detected</h1>
              <pre className="mt-4 p-4 bg-white border border-red-200 rounded overflow-auto">{this.state.error && this.state.error.toString()}</pre>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));

    const initClerk = async () => {
      try {
        // Wait for Clerk SDK to load (Babel scripts run asynchronously)
        let attempts = 0;
        while (typeof Clerk === 'undefined' && attempts < 100) {
          await new Promise(r => setTimeout(r, 50));
          attempts++;
        }
        
        if (typeof Clerk === 'undefined') {
          throw new Error("Clerk SDK failed to load from CDN.");
        }

        await Clerk.load({
          appearance: {
            variables: { colorPrimary: '#4f46e5' }
          }
        });

        if (Clerk.user) {
          // Render the main app
          root.render(<AppErrorBoundary><ReelMakerApp /></AppErrorBoundary>);
          
          // Wait for render, then mount UserButton
          setTimeout(() => {
            const userButtonDiv = document.getElementById('user-button');
            if (userButtonDiv) Clerk.mountUserButton(userButtonDiv);
          }, 100);
        } else {
          // Render full screen sign in
          root.render(
            <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 text-slate-900">
               <div className="mb-8 text-center animate-in fade-in slide-in-from-bottom-4 duration-500">
                 <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-200">
                    <VideoIcon className="text-white w-8 h-8" />
                 </div>
                 <h1 className="text-3xl font-extrabold tracking-tight mb-2">Reel Maker</h1>
                 <p className="text-slate-500 font-medium">Sign in to start creating AI-generated videos</p>
               </div>
              <div id="sign-in"></div>
            </div>
          );
          setTimeout(() => {
            const signInDiv = document.getElementById('sign-in');
            if (signInDiv) Clerk.mountSignIn(signInDiv);
          }, 100);
        }
      } catch (err) {
        console.error("Clerk initialization failed:", err);
        root.render(
          <div className="p-10 bg-red-50 text-red-900 h-screen flex flex-col items-center justify-center text-center">
            <h1 className="text-2xl font-bold mb-4">Authentication Error</h1>
            <p>Failed to load authentication system. Please check your connection and refresh.</p>
            <p className="text-sm mt-4 font-mono">{err.message}</p>
          </div>
        );
      }
    };

    initClerk();
  </script>
</body>
</html>
