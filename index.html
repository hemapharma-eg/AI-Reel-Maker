<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Voice-Over-Slides by TooLabX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin-slow 3s linear infinite; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    // --- Icons ---
    const Icon = ({ path, className, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{__html: path}} {...props} />
    );
    const Play = (props) => <Icon path='<polygon points="5 3 19 12 5 21 5 3"/>' {...props} />;
    const Video = (props) => <Icon path='<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>' {...props} />;
    const Plus = (props) => <Icon path='<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>' {...props} />;
    const Trash = (props) => <Icon path='<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>' {...props} />;
    const Monitor = (props) => <Icon path='<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>' {...props} />;
    const Mic = (props) => <Icon path='<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>' {...props} />;
    const Download = (props) => <Icon path='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>' {...props} />;
    const Loader = (props) => <Icon path='<line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>' {...props} />;
    const Upload = (props) => <Icon path='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>' {...props} />;
    const Settings = (props) => <Icon path='<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>' {...props} />;
    const Star = (props) => <Icon path='<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' {...props} />;

    // --- Config & Utils ---
    const VOICES = [
      "Zephyr", "Puck", "Charon", "Kore", "Fenrir", "Leda", "Orus", "Aoede", 
      "Callirrhoe", "Autonoe", "Enceladus", "Iapetus", "Umbriel", "Algieba", 
      "Despina", "Erinome", "Algenib", "Rasalgethi", "Laomedeia", "Achernar", 
      "Alnilam", "Schedar", "Gacrux", "Pulcherrima", "Achird", "Zubenelgenubi", 
      "Vindemiatrix", "Sadachbia", "Sadaltager", "Sulafat"
    ];

    function base64ToWav(base64, sampleRate = 24000) {
      const binaryString = atob(base64);
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
      
      const wavBuffer = new ArrayBuffer(44 + bytes.byteLength);
      const view = new DataView(wavBuffer);
      const writeString = (v, offset, str) => { for (let i = 0; i < str.length; i++) v.setUint8(offset + i, str.charCodeAt(i)); };

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + bytes.byteLength, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true); // Mono
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, bytes.byteLength, true);
      new Uint8Array(wavBuffer, 44).set(bytes);
      return new Blob([wavBuffer], { type: 'audio/wav' });
    }

    const fileToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    async function fetchGemini(endpoint, payload, key) {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${endpoint}:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        const error = new Error(`API Error ${res.status}`);
        error.status = res.status;
        throw error;
      }
      return res.json();
    }

    const drawSlideVisual = (ctx, w, h, slide, elapsed) => {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, w, h);
      const imgW = 920;
      ctx.fillStyle = '#1e293b';
      ctx.fillRect(0, 0, imgW, h);

      if (slide.img) {
        const scale = Math.min(imgW / slide.img.width, h / slide.img.height);
        const iw = slide.img.width * scale;
        const ih = slide.img.height * scale;
        ctx.drawImage(slide.img, (imgW - iw) / 2, (h - ih) / 2, iw, ih);
      } else {
        ctx.fillStyle = '#f8fafc';
        ctx.font = 'bold 40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(slide.text || 'Untitled Slide', imgW / 2, h / 2);
      }

      ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(imgW, 0); ctx.lineTo(imgW, h); ctx.stroke();

      if (slide.sentences && slide.duration > 0) {
        const progress = Math.min(1, elapsed / slide.duration);
        const visibleCount = Math.floor(progress * slide.sentences.length) + 1;
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        let curY = 40; const startX = imgW + 30; const maxW = 300;
        slide.sentences.slice(0, visibleCount).forEach((sentence, i) => {
          const isLast = i === visibleCount - 1;
          ctx.fillStyle = isLast ? '#ffffff' : '#94a3b8';
          ctx.font = (isLast ? 'bold ' : '') + '22px sans-serif';
          const words = sentence.split(' ');
          let line = '';
          words.forEach(word => {
            const test = line + word + ' ';
            if (ctx.measureText(test).width > maxW) {
              ctx.fillText(line, startX, curY); line = word + ' '; curY += 30;
            } else line = test;
          });
          ctx.fillText(line, startX, curY); curY += 40;
        });
      }
    };

    // --- Main App ---
    function App() {
      const [view, setView] = useState('home');
      const [apiKey, setApiKey] = useState('');
      const [slides, setSlides] = useState([{ id: Date.now(), imageFile: null, preview: null, script: '', voice: 'Kore', audioUrl: null }]);
      const [globalVoice, setGlobalVoice] = useState('Kore');
      const [progress, setProgress] = useState(null); // { step: number, percent: number, msg: string }
      const [finalVideo, setFinalVideo] = useState(null);
      const fileInputRef = useRef(null);

      const updateSlide = (id, updates) => setSlides(s => s.map(x => x.id === id ? { ...x, ...updates } : x));

      const handleBulkUpload = (e) => {
        const files = Array.from(e.target.files);
        const newSlides = files.map(file => ({
          id: Math.random(), imageFile: file, preview: URL.createObjectURL(file), script: '', voice: globalVoice, audioUrl: null
        }));
        setSlides(prev => (prev.length === 1 && !prev[0].imageFile ? newSlides : [...prev, ...newSlides]));
        e.target.value = '';
      };

      const generateAIContent = async () => {
        setProgress({ step: 2, percent: 0, msg: 'Initializing AI generation...' });
        let done = 0;
        const toProcess = slides.filter(s => s.imageFile && (!s.script || !s.audioUrl));
        
        for (const slide of toProcess) {
          try {
            let script = slide.script;
            if (!script) {
              updateSlide(slide.id, { isGenerating: true });
              const b64 = await fileToBase64(slide.imageFile);
              const data = await fetchGemini('gemini-2.5-flash-preview-09-2025', {
                contents: [{ parts: [{ text: "Act as an expert educator. Briefly explain this slide (2-3 sentences). Only return script." }, { inlineData: { mimeType: slide.imageFile.type, data: b64 } }] }]
              }, apiKey);
              script = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
              updateSlide(slide.id, { script });
            }

            if (script && !slide.audioUrl) {
              const data = await fetchGemini('gemini-2.5-flash-preview-tts', {
                contents: [{ parts: [{ text: script }] }],
                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: slide.voice } } } }
              }, apiKey);
              const part = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
              if (part) {
                const blob = base64ToWav(part.data, parseInt(part.mimeType.match(/rate=(\d+)/)?.[1] || 24000));
                updateSlide(slide.id, { audioUrl: URL.createObjectURL(blob), audioBlob: blob });
              }
            }
          } catch (e) {
            console.error(e);
          } finally {
            updateSlide(slide.id, { isGenerating: false });
            done++;
            setProgress(p => ({ ...p, percent: Math.round((done / toProcess.length) * 100), msg: `Processed ${done}/${toProcess.length} slides` }));
          }
        }
        setTimeout(() => setProgress(null), 2000);
      };

      const compileVideo = async () => {
        setProgress({ step: 3, percent: 0, msg: 'Preparing compiler...' });
        try {
          const { Muxer, ArrayBufferTarget } = await import('https://cdn.jsdelivr.net/npm/webm-muxer@5.0.2/+esm');
          const canvas = document.createElement('canvas'); canvas.width = 1280; canvas.height = 720;
          const ctx = canvas.getContext('2d');
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          
          if (slides.length === 0) throw new Error("No slides to compile.");
          let totalMs = 0;
          const visuals = await Promise.all(slides.map(async (s, i) => {
            const img = s.preview ? await new Promise(r => { const m = new Image(); m.onload = () => r(m); m.src = s.preview; }) : null;
            let dur = 3000;
            let buf = null;
            if (s.audioBlob) {
              buf = await audioCtx.decodeAudioData(await s.audioBlob.arrayBuffer());
              dur = Math.max(buf.duration * 1000, 500);
            }
            const res = { img, sentences: s.script ? s.script.split(/(?<=[.!?])\s+/).filter(Boolean).map(x => x.trim()) : [], duration: dur, start: totalMs, buffer: buf };
            totalMs += dur;
            return res;
          }));

          const fps = 30; const totalFrames = Math.ceil((totalMs / 1000) * fps);
          const sampleRate = 48000;
          const offlineCtx = new OfflineAudioContext(1, Math.ceil(totalMs / 1000 * sampleRate), sampleRate);
          visuals.forEach(v => {
            if (v.buffer) {
              const src = offlineCtx.createBufferSource(); src.buffer = v.buffer;
              src.connect(offlineCtx.destination); src.start(v.start / 1000);
            }
          });
          const renderedAudio = await offlineCtx.startRendering();
          const audioData = renderedAudio.getChannelData(0);

          const muxer = new Muxer({ target: new ArrayBufferTarget(), video: { codec: 'V_VP9', width: 1280, height: 720, framerate: fps }, audio: { codec: 'A_OPUS', sampleRate, numberOfChannels: 1 } });
          const vEnc = new VideoEncoder({ output: (c, m) => muxer.addVideoChunk(c, m), error: e => console.error(e) });
          vEnc.configure({ codec: 'vp09.00.10.08', width: 1280, height: 720, bitrate: 2e6 });
          const aEnc = new AudioEncoder({ output: (c, m) => muxer.addAudioChunk(c, m), error: e => console.error(e) });
          aEnc.configure({ codec: 'opus', sampleRate, numberOfChannels: 1, bitrate: 128000 });

          // Chunk audio encoding
          const chunkSize = 4800;
          for (let i = 0; i < audioData.length; i += chunkSize) {
            const slice = audioData.slice(i, i + chunkSize);
            const data = new AudioData({ format: 'f32-planar', sampleRate, numberOfFrames: slice.length, numberOfChannels: 1, timestamp: (i / sampleRate) * 1e6, data: slice });
            aEnc.encode(data); data.close();
          }

          for (let f = 0; f < totalFrames; f++) {
            const time = (f / fps) * 1000;
            const slide = visuals.find(v => time >= v.start && time < v.start + v.duration) || visuals[visuals.length - 1];
            drawSlideVisual(ctx, 1280, 720, slide, time - slide.start);
            const frame = new VideoFrame(canvas, { timestamp: time * 1000 });
            vEnc.encode(frame); frame.close();
            while (vEnc.encodeQueueSize > 30) {
              await new Promise(r => setTimeout(r, 10));
            }
            if (f % 30 === 0) setProgress(p => ({ ...p, percent: Math.round(f / totalFrames * 100), msg: 'Rendering frames...' }));
          }

          await vEnc.flush(); await aEnc.flush(); muxer.finalize();
          setFinalVideo(URL.createObjectURL(new Blob([muxer.target.buffer], { type: 'video/webm' })));
          setProgress(null);
        } catch (e) {
          console.error(e);
          alert("Fast compile failed. Fallback to realtime recording.");
          setProgress(null);
        }
      };

      if (view === 'home') {
        return (
          <div className="min-h-screen flex items-center justify-center p-6">
            <div className="max-w-md w-full glass rounded-3xl p-8 border border-white/20 shadow-2xl text-center">
              <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl"><Star className="text-white w-10 h-10" /></div>
              <h1 className="text-3xl font-extrabold text-slate-900 mb-2">AI Voice-Over-Slides</h1>
              <p className="text-slate-600 mb-2 text-sm font-bold text-indigo-600">by TooLabX</p>
              <p className="text-slate-600 mb-8 text-sm">Turn your presentation slides into AI-narrated videos effortlessly.</p>
              <div className="text-left mb-6">
                <label className="block text-sm font-bold text-slate-700 mb-2">Gemini API Key</label>
                <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="AIzaSy..." className="w-full bg-white/50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                <p className="mt-2 text-xs text-slate-500 text-right">
                  Get your free key from <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="text-indigo-600 hover:underline font-bold">Google AI Studio</a>
                </p>
              </div>
              <div className="flex flex-col gap-3">
                <button onClick={() => setView('app')} disabled={!apiKey} className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">Get Started</button>
                <button onClick={() => setView('app')} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition-all active:scale-95 text-sm">Continue without API Key</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          <header className="glass sticky top-0 z-20 border-b border-slate-200/50 px-8 py-4 flex justify-between items-center">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center"><Video className="text-white w-6 h-6" /></div>
              <h1 className="text-xl font-black text-slate-900 uppercase tracking-tighter">AI Voice-Over-Slides</h1>
            </div>
            <div className="flex items-center gap-4">
              <select value={globalVoice} onChange={e => { setGlobalVoice(e.target.value); setSlides(s => s.map(x => ({ ...x, voice: e.target.value }))); }} className="bg-white border text-sm font-bold p-2 rounded-lg outline-none">
                {VOICES.map(v => <option key={v} value={v}>{v}</option>)}
              </select>
            </div>
          </header>

          <main className="flex-1 max-w-5xl mx-auto w-full p-8">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
              {[
                { s: 1, t: "Upload", d: "Bulk upload images", i: <Upload />, a: () => fileInputRef.current.click() },
                { s: 2, t: "AI Generate", d: "Scripts & Voiceovers", i: <Star />, a: generateAIContent, p: progress?.step === 2 },
                { s: 3, t: "Compile", d: "Export WebM Video", i: <Video />, a: compileVideo, p: progress?.step === 3, primary: true }
              ].map(step => (
                <div key={step.s} className={`p-6 rounded-2xl border transition-all ${step.primary ? 'bg-indigo-600 border-indigo-500 shadow-indigo-200 text-white' : 'bg-white border-slate-200 text-slate-900 shadow-sm'}`}>
                  <div className="flex justify-between items-center mb-4"><span className={`text-xs font-black px-2 py-1 rounded ${step.primary ? 'bg-white/20' : 'bg-indigo-100 text-indigo-700'}`}>STEP {step.s}</span>{step.i}</div>
                  <h3 className="font-black text-lg mb-1">{step.t}</h3>
                  <p className={`text-xs mb-6 ${step.primary ? 'text-white/70' : 'text-slate-500'}`}>{step.d}</p>
                  <button onClick={step.a} disabled={progress} className={`w-full py-3 rounded-xl font-bold text-sm transition-all active:scale-95 ${step.primary ? 'bg-white text-indigo-600' : 'bg-slate-100 hover:bg-slate-200'}`}>
                    {step.p ? <Loader className="w-4 h-4 animate-spin mx-auto" /> : step.t}
                  </button>
                  {step.p && <div className="mt-4 h-1.5 bg-black/10 rounded-full overflow-hidden"><div className="h-full bg-white transition-all" style={{ width: `${progress.percent}%` }} /></div>}
                </div>
              ))}
            </div>

            <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={handleBulkUpload} />

            <div className="space-y-6">
              {slides.map((slide, idx) => (
                <div key={slide.id} className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col md:flex-row h-auto md:h-64 transition-all hover:shadow-xl hover:border-indigo-200">
                  <div className="md:w-72 bg-slate-100 flex items-center justify-center p-4 relative group">
                    {slide.preview ? <img src={slide.preview} className="max-h-full max-w-full rounded-lg shadow-md" /> : <Monitor className="w-12 h-12 text-slate-300" />}
                    <div className="absolute top-4 left-4 bg-black/80 text-white text-[10px] font-black px-2 py-1 rounded">{idx + 1}</div>
                  </div>
                  <div className="flex-1 p-6 flex flex-col">
                    <div className="flex justify-between items-center mb-3">
                      <div className="flex items-center gap-2 font-bold text-slate-700 text-sm italic"><Mic className="w-4 h-4" /> Voiceover Script</div>
                      <button onClick={() => setSlides(s => s.filter(x => x.id !== slide.id))} className="text-slate-300 hover:text-red-500"><Trash className="w-5 h-5" /></button>
                    </div>
                    <textarea value={slide.script} onChange={e => updateSlide(slide.id, { script: e.target.value })} placeholder="Write or generate a script..." className="flex-1 w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm resize-none focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                    <div className="mt-4 flex justify-end items-center">
                      {slide.isGenerating ? <Loader className="w-5 h-5 animate-spin text-indigo-600" /> : slide.audioUrl && <button onClick={() => new Audio(slide.audioUrl).play()} className="flex items-center gap-2 text-emerald-600 font-bold text-xs bg-emerald-50 px-3 py-1.5 rounded-full hover:bg-emerald-100 transition-all"><Play className="w-3 h-3" /> PREVIEW AUDIO</button>}
                    </div>
                  </div>
                </div>
              ))}
              <button onClick={() => setSlides(s => [...s, { id: Math.random(), imageFile: null, preview: null, script: '', voice: globalVoice, audioUrl: null }])} className="w-full py-8 border-4 border-dashed border-slate-200 rounded-3xl text-slate-400 font-black flex flex-col items-center justify-center gap-2 hover:bg-slate-50 hover:border-indigo-300 hover:text-indigo-500 transition-all uppercase text-xs tracking-widest"><Plus className="w-8 h-8" /> Add Manual Slide</button>
            </div>
          </main>

          {finalVideo && (
            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-50 flex items-center justify-center p-8">
              <div className="max-w-4xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden animate-in zoom-in duration-300">
                <div className="px-10 py-8 border-b flex justify-between items-center bg-indigo-50/50">
                  <h2 className="text-3xl font-black text-slate-900 tracking-tighter uppercase">Video Ready</h2>
                  <button onClick={() => setFinalVideo(null)} className="p-2 hover:bg-slate-200 rounded-full transition-all">✕</button>
                </div>
                <div className="p-10 bg-slate-900 aspect-video flex items-center justify-center">
                  <video src={finalVideo} controls className="max-h-full rounded-2xl shadow-2xl border border-white/10" />
                </div>
                <div className="p-10 flex flex-col md:flex-row justify-between items-center gap-6">
                  <div className="text-slate-500 text-sm font-medium italic">High quality WebM exported successfully.</div>
                  <div className="flex gap-4">
                    <button onClick={() => setFinalVideo(null)} className="px-8 py-4 font-bold text-slate-600 hover:bg-slate-100 rounded-2xl transition-all uppercase text-xs">Edit More</button>
                    <a href={finalVideo} download="TooLabX_Video.webm" className="px-8 py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:scale-105 transition-all flex items-center gap-3 uppercase text-xs tracking-widest"><Download className="w-5 h-5" /> Download Export</a>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
