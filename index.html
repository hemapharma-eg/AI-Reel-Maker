<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlideCaster - AI Voice-Over-Slides</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/lucide-react@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Core Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoom-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-in { animation: var(--anim-name) var(--anim-duration) ease-out; }
    .fade-in { --anim-name: fade-in; --anim-duration: 300ms; }
    .zoom-in { --anim-name: zoom-in; --anim-duration: 300ms; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    // Safety check for Lucide icons to prevent crash if library version mismatch or missing from CDN
    const getSafeIcon = (name) => {
      // Try multiple possible global names used by various CDN versions
      const Lib = (typeof LucideReact !== 'undefined' ? LucideReact : (typeof lucide !== 'undefined' ? lucide : null));
      
      // Try different lookup paths in the object
      if (Lib) {
        if (Lib[name]) return Lib[name];
        // Some versions put components inside an 'icons' sub-object
        if (Lib.icons && Lib.icons[name]) return Lib.icons[name];
        // Handle case sensitivity variations
        const lowerName = name.toLowerCase();
        for (let key in Lib) {
          if (key.toLowerCase() === lowerName) return Lib[key];
        }
      }

      // Final bulletproof fallback: Simple SVG icon so the app never crashes
      return (props) => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
          <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
      );
    };

    const Play = getSafeIcon('Play');
    const Video = getSafeIcon('Video');
    const Plus = getSafeIcon('Plus');
    const Trash2 = getSafeIcon('Trash2');
    const Presentation = getSafeIcon('Presentation');
    const Mic = getSafeIcon('Mic');
    const Download = getSafeIcon('Download');
    const Loader2 = getSafeIcon('Loader2');
    const Upload = getSafeIcon('Upload');
    const Settings = getSafeIcon('Settings');
    const Sparkles = getSafeIcon('Sparkles');
    const FileText = getSafeIcon('FileText');
    const Clipboard = getSafeIcon('Clipboard');
    const FileAudio = getSafeIcon('FileAudio');
    const X = getSafeIcon('X');
    const ArrowUp = getSafeIcon('ArrowUp');
    const ArrowDown = getSafeIcon('ArrowDown');
    const FileOutput = getSafeIcon('FileOutput');

    const apiKey = ""; // Will be provided by environment

    // --- Config & Utils ---
    const VOICES = [
      { id: "alloy", name: "Alloy (OpenAI)", provider: "openai" },
      { id: "echo", name: "Echo (OpenAI)", provider: "openai" },
      { id: "fable", name: "Fable (OpenAI)", provider: "openai" },
      { id: "onyx", name: "Onyx (OpenAI)", provider: "openai" },
      { id: "nova", name: "Nova (OpenAI)", provider: "openai" },
      { id: "shimmer", name: "Shimmer (OpenAI)", provider: "openai" }
    ];

    // Utility: Convert File to Base64 for Gemini API (not needed currently,แต่เก็บไว้เผื่อขยาย)
    const fileToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = error => reject(error);
    });

    // Utility: Extract slide notes from PPTX XML
    const extractNotesFromXml = (xmlStr) => {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
      const textNodes = xmlDoc.getElementsByTagName("a:t");
      let notes = "";
      for (let node of textNodes) {
        notes += node.textContent + " ";
      }
      return notes.trim();
    };

    // Main Application Component
    function SlideCasterApp() {
      const [slides, setSlides] = useState([
        { 
          id: 1, 
          imageFile: null, 
          imagePreviewUrl: null, 
          script: "", 
          audioBlob: null, 
          audioUrl: null, 
          audioName: ""
        }
      ]);
      
      const [isCompiling, setIsCompiling] = useState(false);
      const [compilationProgress, setCompilationProgress] = useState("");
      const [finalVideoUrl, setFinalVideoUrl] = useState(null);

      const [showPromptModal, setShowPromptModal] = useState(false);
      const [showImportModal, setShowImportModal] = useState(false);
      const [showVoiceModal, setShowVoiceModal] = useState(false);
      const [importText, setImportText] = useState("");
      
      const [selectedVoice, setSelectedVoice] = useState("");
      const [browserVoices, setBrowserVoices] = useState([]);

      const fileInputRef = useRef(null);
      const wordInputRef = useRef(null);
      const pdfInputRef = useRef(null);
      const audioBulkInputRef = useRef(null);

      useEffect(() => {
        // Initialize PDF.js worker
        if (window.pdfjsLib) {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        const loadBrowserVoices = () => {
          const v = window.speechSynthesis.getVoices();
          // Filter out low-quality/redundant ones if possible, or just show all
          const filtered = v.filter(voice => !voice.name.includes('Compact'));
          setBrowserVoices(filtered);
          if (filtered.length > 0 && !selectedVoice) {
             const defaultVoice = filtered.find(v => v.default) || filtered[0];
             setSelectedVoice(defaultVoice.voiceURI);
          }
        };
        
        loadBrowserVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = loadBrowserVoices;
        }
      }, []);

      const handleAddSlide = () => {
        setSlides(prev => [...prev, { 
          id: Date.now() + Math.random(), 
          imageFile: null, 
          imagePreviewUrl: null, 
          script: "", 
          audioBlob: null, 
          audioUrl: null,
          audioName: ""
        }]);
      };

      const handleRemoveSlide = (id) => {
        setSlides(prev => prev.filter(s => s.id !== id));
      };

      const handleMoveSlide = (index, direction) => {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= slides.length) return;
        
        const newSlides = [...slides];
        const temp = newSlides[index];
        newSlides[index] = newSlides[newIndex];
        newSlides[newIndex] = temp;
        setSlides(newSlides);
      };

      const updateSlide = (id, updates) => {
        setSlides(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
      };

    const handlePdfUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        setIsCompiling(true);
        setCompilationProgress("Processing PDF Slides...");

        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          const numPages = pdf.numPages;
          
          const newSlides = [];
          for (let i = 1; i <= numPages; i++) {
            setCompilationProgress(`Rendering page ${i} of ${numPages}...`);
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2.0 }); // 2x for high resolution
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            await page.render({ canvasContext: context, viewport: viewport }).promise;
            const dataUrl = canvas.toDataURL('image/png');
            
            // Check if we already have a slide (to merge with PPTX notes)
            // If we are uploading PDF, we usually want to REPLACE images of existing slides
            // or create new ones if they don't exist.
            
            newSlides.push({
              id: Date.now() + i + Math.random(),
              imageFile: null,
              imagePreviewUrl: dataUrl,
              script: slides[i-1]?.script || "", // Try to preserve script if it exists
              audioBlob: slides[i-1]?.audioBlob || null,
              audioUrl: slides[i-1]?.audioUrl || null,
              audioName: slides[i-1]?.audioName || ""
            });
          }

          setSlides(newSlides);
        } catch (err) {
          console.error("PDF Error:", err);
          alert("Failed to process PDF. Make sure it's a valid file.");
        } finally {
          setIsCompiling(false);
          setCompilationProgress("");
          if (pdfInputRef.current) pdfInputRef.current.value = "";
        }
      };

    const handleWordUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        setIsCompiling(true);
        setCompilationProgress("Reading Word Document...");

        try {
          const arrayBuffer = await file.arrayBuffer();
          const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer });
          const html = result.value;
          
          // Simple table parser for the extracted HTML
          const Parser = new DOMParser();
          const doc = Parser.parseFromString(html, 'text/html');
          const rows = Array.from(doc.querySelectorAll('tr'));
          
          const scriptMap = {};
          rows.forEach((row, index) => {
            const cells = Array.from(row.querySelectorAll('td'));
            if (cells.length >= 2) {
              const slideNum = parseInt(cells[0].textContent.replace(/[^0-9]/g, ''));
              const transcript = cells[1].textContent.trim();
              if (!isNaN(slideNum) && transcript) {
                scriptMap[slideNum] = transcript;
              }
            }
          });

          setSlides(prev => prev.map((slide, index) => {
            const slideNum = index + 1;
            if (scriptMap[slideNum]) {
              return { ...slide, script: scriptMap[slideNum] };
            }
            return slide;
          }));

          alert("Successfully imported scripts from Word!");
        } catch (err) {
          console.error("Word Error:", err);
          alert("Failed to process Word file. Make sure it's a valid .docx with two columns: Slide # and Transcript.");
        } finally {
          setIsCompiling(false);
          setCompilationProgress("");
          if (wordInputRef.current) wordInputRef.current.value = "";
        }
      };

      const downloadWordTemplate = () => {
        // Create a basic CSV-like blob that Word can open as a table or just a simple instruction doc
        // Actually, creating a real .docx is better for the user experience
        // We can use a simpler approach: encode a real but empty .docx template as base64
        // Base64 for an empty .docx with a 2x2 table: Slide # | Transcript
        const base64Template = "UEsDBBQAAAAIAKVqPlYK47fAAAAAAAEAABAAAFtBcnVwXS9fcmVscy8ucmVsc4SPvW7DMBCE7wX9DsH3VpIDRVCkuIAnSJBeoI86WqIkFqIukvbr27ZBy9IunHAH3N29U76+NreYOfmArW9VAnH0Dlr706ov8Lj8XN0AiaXdtTYHVs6Y2L3f757QSTlV0m6pEuFpVcE65M80mU4W3eE8yBfPmqMNoU6Yewis93mGlfS5K+A/Y6SSe66M/8w40pLPrIEH0DPrC087pYp5I+eREOaL/U9Kx2W658B/K6u/UEsDBBQAAAAIAKVqPlZjX/oAAAAAAAYAAAsAAHdvcmQvLndvcmRzP00DBBQAAAAIAKVqPlYAAAsAAAAAAA="; // Truncated for example
        
        // Let's generate a simple CSV and name it .csv or use an actual .docx generation if mammoth/docx is available
        // Mammoth is only for reading. Let's use a Data URI for a simple Word-compatible HTML file
        const html = `
          <table border="1">
            <tr><th>Slide #</th><th>Transcript</th></tr>
            <tr><td>1</td><td>Enter transcript for slide 1 here...</td></tr>
            <tr><td>2</td><td>Enter transcript for slide 2 here...</td></tr>
            <tr><td>3</td><td>...</td></tr>
          </table>
        `;
        const blob = new Blob([html], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "SlideCaster_Template.doc";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      const handleImageUpload = (id, e) => {
        const files = e.target.files;
        if (files && files.length > 0) {
          const file = files[0];
          const previewUrl = URL.createObjectURL(file);
          updateSlide(id, { imageFile: file, imagePreviewUrl: previewUrl });
        }
      };

      const handleBulkImageUpload = (e) => {
        const files = e.target.files ? Array.from(e.target.files) : [];
        if (files.length === 0) return;

        const newSlides = files.map((file, index) => ({
          id: Date.now() + index + Math.random(),
          imageFile: file,
          imagePreviewUrl: URL.createObjectURL(file),
          script: "",
          audioBlob: null,
          audioUrl: null,
          audioName: ""
        }));

        setSlides(prev => {
          if (prev.length === 1 && !prev[0].imageFile && !prev[0].script) {
            return newSlides;
          } else {
            return [...prev, ...newSlides];
          }
        });
        
        if (fileInputRef.current) {
          fileInputRef.current.value = '';
        }
      };

      const handleAudioUpload = (id, e) => {
        const files = e.target.files;
        if (files && files.length > 0) {
          const file = files[0];
          const audioUrl = URL.createObjectURL(file);
          updateSlide(id, { audioBlob: file, audioUrl, audioName: file.name });
        }
      };

      const handleBulkAudioUpload = (e) => {
        const files = Array.from(e.target.files || []);
        if (files.length === 0) return;

        // Try to match by filename number or just sequential
        const sortedFiles = files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
        
        setSlides(prev => prev.map((slide, index) => {
          if (index < sortedFiles.length) {
            const file = sortedFiles[index];
            return {
              ...slide,
              audioBlob: file,
              audioUrl: URL.createObjectURL(file),
              audioName: file.name
            };
          }
          return slide;
        }));
      };

      const copyAiPrompt = () => {
        const slideCount = slides.length;
        const prompt = `I am creating a video with ${slideCount} slides. Please write a clear, engaging educational script for each slide (approx 3-5 sentences per slide). 
Topic: [INSERT TOPIC HERE]

Please return the result ONLY as a JSON array of strings, like this:
["Script for slide 1...", "Script for slide 2...", ...]`;
        
        navigator.clipboard.writeText(prompt);
        alert("AI Prompt copied to clipboard! Paste it into Gemini or ChatGPT, then come back and click 'Bulk Import Scripts'.");
      };

      const handleImportScripts = () => {
        try {
          let data = [];
          if (importText.trim().startsWith("[")) {
            data = JSON.parse(importText);
          } else {
            // Fallback: split by newlines if not JSON
            data = importText.split("\n").filter(l => l.trim().length > 10);
          }

          if (!Array.isArray(data)) throw new Error("Imported data must be an array of strings.");

          setSlides(prev => prev.map((slide, index) => {
            if (index < data.length) {
              return { ...slide, script: data[index] };
            }
            return slide;
          }));
          
          setShowImportModal(false);
          setImportText("");
          alert("Successfully imported scripts!");
        } catch (e) {
          alert("Failed to import. Please make sure you pasted a valid JSON array or a list of sentences.");
        }
      };

      const playAudio = (url) => {
        if (!url) return;
        const audio = new Audio(url);
        audio.play().catch(e => console.error("Audio playback failed:", e));
      };

      const speakText = (text, voiceId) => {
        if (!text) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        
        // Find selected voice (either browser voice or we use default)
        const voice = browserVoices.find(v => v.voiceURI === voiceId || v.name === voiceId);
        if (voice) utterance.voice = voice;
        
        window.speechSynthesis.speak(utterance);
      };

      const playVoiceSample = (voiceId) => {
        const sampleText = "Hello! This is a sample of my voice. I hope it sounds great for your presentation.";
        const voiceObj = VOICES.find(v => v.id === voiceId);
        
        if (voiceObj && voiceObj.provider === 'openai') {
          alert("OpenAI voice samples require an API key and network request. Browser voices are available for free below.");
        } else {
          speakText(sampleText, voiceId);
        }
      };

      const compileVideo = async () => {
        if (slides.length === 0) return;
        setIsCompiling(true);
        setCompilationProgress("Initializing canvas...");

        try {
          const canvas = document.createElement('canvas');
          canvas.width = 1280;
          canvas.height = 720;
          const ctx = canvas.getContext('2d');

          const getStream = canvas.captureStream || canvas.mozCaptureStream;
          if (!getStream) {
            throw new Error("Your browser does not support canvas video export. Try Chrome or Edge.");
          }
          
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) {
            throw new Error("Your browser does not support AudioContext.");
          }

          const audioCtx = new AudioContextClass();
          const dest = audioCtx.createMediaStreamDestination();

          const canvasStream = getStream.call(canvas, 30); 
          const combinedStream = new MediaStream([
            ...canvasStream.getVideoTracks(),
            ...dest.stream.getAudioTracks()
          ]);

          let options = { mimeType: 'video/webm;codecs=vp9,opus' };
          if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/webm' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
              options = { mimeType: 'video/mp4' };
            }
          }

          const recorder = new MediaRecorder(combinedStream, options);
          const chunks = [];
          recorder.ondataavailable = e => {
            if (e.data && e.data.size > 0) chunks.push(e.data);
          };

          const recordPromise = new Promise(resolve => {
            recorder.onstop = () => resolve(new Blob(chunks, { type: options.mimeType }));
          });

          recorder.start();

          let isRecording = true;
          let currentSlideVisual = null;

          const renderLoop = () => {
            if (!isRecording) return;
            
            ctx.fillStyle = '#0f172a'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentSlideVisual) {
              const imageAreaW = 920;
              const sidebarW = 360;
              
              ctx.fillStyle = '#1e293b';
              ctx.fillRect(0, 0, imageAreaW, canvas.height);

              if (currentSlideVisual.img) {
                const img = currentSlideVisual.img;
                const scale = Math.min(imageAreaW / img.width, canvas.height / img.height);
                const w = img.width * scale;
                const h = img.height * scale;
                const x = (imageAreaW - w) / 2;
                const y = (canvas.height - h) / 2;
                ctx.drawImage(img, x, y, w, h);
              } else {
                ctx.fillStyle = '#f8fafc';
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(currentSlideVisual.text, imageAreaW / 2, canvas.height / 2);
              }

              ctx.strokeStyle = '#334155';
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.moveTo(imageAreaW, 0);
              ctx.lineTo(imageAreaW, canvas.height);
              ctx.stroke();

              if (currentSlideVisual.sentences && currentSlideVisual.duration > 0) {
                const elapsed = performance.now() - currentSlideVisual.startTime;
                const progress = Math.min(1, Math.max(0, elapsed / currentSlideVisual.duration));
                
                const totalSentences = currentSlideVisual.sentences.length;
                const visibleCount = Math.min(totalSentences, Math.floor(progress * totalSentences) + 1);

                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                
                let currentY = 40;
                const startX = imageAreaW + 30;
                const maxTextW = sidebarW - 60;

                for (let j = 0; j < totalSentences; j++) {
                  if (j < visibleCount) {
                    const isCurrent = j === visibleCount - 1;
                    ctx.fillStyle = isCurrent ? '#ffffff' : '#94a3b8';
                    ctx.font = (isCurrent ? 'bold ' : '') + '22px sans-serif';
                    
                    const words = currentSlideVisual.sentences[j].split(' ');
                    let line = '';
                    
                    for(let n = 0; n < words.length; n++) {
                      const testLine = line + words[n] + ' ';
                      const metrics = ctx.measureText(testLine);
                      if (metrics.width > maxTextW && n > 0) {
                        ctx.fillText(line, startX, currentY);
                        line = words[n] + ' ';
                        currentY += 30;
                      } else {
                        line = testLine;
                      }
                    }
                    ctx.fillText(line, startX, currentY);
                    currentY += 40; 
                  }
                }
              }
            }
            requestAnimationFrame(renderLoop);
          };
          
          requestAnimationFrame(renderLoop);

          for (let i = 0; i < slides.length; i++) {
            const slide = slides[i];
            setCompilationProgress(`Processing slide ${i + 1} of ${slides.length}...`);
            
            const sentenceRegex = /[^.!?]+[.!?]+|\s*$/g;
            const rawSentences = slide.script ? slide.script.match(sentenceRegex) : [];
            const sentences = rawSentences ? rawSentences.map(s => s.trim()).filter(Boolean) : [];
            if (sentences.length === 0 && slide.script) sentences.push(slide.script);

            let slideImg = null;
            if (slide.imagePreviewUrl) {
              slideImg = new Image();
              slideImg.src = slide.imagePreviewUrl;
              await new Promise((resolve) => { 
                slideImg.onload = resolve; 
                slideImg.onerror = () => {
                  console.warn(`Failed to load image for slide ${i+1}`);
                  resolve(); 
                };
              });
            }

            let audioDurationMs = 3000; 
            let audioBuffer = null;

            if (slide.audioBlob) {
              try {
                const arrayBuffer = await slide.audioBlob.arrayBuffer();
                audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                audioDurationMs = audioBuffer.duration * 1000;
              } catch (audioErr) {
                console.error(`Audio processing failed for slide ${i+1}:`, audioErr);
              }
            } else if (slide.script) {
               audioDurationMs = Math.max(3000, slide.script.length * 60);
            }

            currentSlideVisual = { 
              img: slideImg, 
              text: `Slide ${i + 1} (No Image)`,
              sentences: sentences,
              duration: audioDurationMs,
              startTime: performance.now()
            };

            if (audioBuffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(dest);
                source.start();
                await new Promise(r => { source.onended = r; });
            } else {
                await new Promise(r => setTimeout(r, audioDurationMs));
            }
          }

          setCompilationProgress("Finalizing video file...");
          isRecording = false; 
          recorder.stop();
          
          const finalBlob = await recordPromise;
          setFinalVideoUrl(URL.createObjectURL(finalBlob));
          
          if (audioCtx.state !== 'closed') {
            await audioCtx.close();
          }

          alert("Video compilation finished! Please note: Automated voice-over in the final video requires an OpenAI API key for best results. Browser voices work for previews but may not record directly in all browsers.");
          
        } catch (err) {
          console.error("Compilation failed:", err);
          alert(err.message || "Video compilation failed. See console for details.");
        } finally {
          setIsCompiling(false);
          setCompilationProgress("");
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 flex flex-col">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10 flex-shrink-0">
            <div className="max-w-5xl mx-auto px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-inner">
                  <Video className="text-white w-5 h-5" />
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight text-slate-900">SlideCaster</h1>
                  <p className="text-xs text-slate-500 font-medium tracking-tight">Professional Video Compiler</p>
                </div>
              </div>
              
              <div className="flex items-center gap-2 flex-wrap justify-center">
                <button 
                  onClick={copyAiPrompt}
                  className="bg-white border border-slate-200 text-slate-700 text-xs font-semibold px-3 py-2 rounded-lg hover:bg-slate-50 transition-all flex items-center gap-2 shadow-sm"
                >
                  <Copy className="w-3.5 h-3.5 text-indigo-500" />
                  Copy AI Prompt
                </button>
                <button 
                  onClick={() => setShowImportModal(true)}
                  className="bg-white border border-slate-200 text-slate-700 text-xs font-semibold px-3 py-2 rounded-lg hover:bg-slate-50 transition-all flex items-center gap-2 shadow-sm"
                >
                  <Clipboard className="w-3.5 h-3.5 text-emerald-500" />
                  Bulk Import Scripts
                </button>
                <button 
                  onClick={() => audioBulkInputRef.current?.click()}
                  className="bg-indigo-600 text-white text-xs font-semibold px-3 py-2 rounded-lg hover:bg-indigo-700 transition-all flex items-center gap-2 shadow-md"
                >
                  <FileAudio className="w-3.5 h-3.5" />
                  Bulk Audio Upload
                </button>
                <button 
                  onClick={() => pdfInputRef.current?.click()}
                  className="bg-indigo-600 text-white text-xs font-semibold px-3 py-2 rounded-lg hover:bg-indigo-700 transition-all flex items-center gap-2 shadow-md"
                >
                  <FileText className="w-3.5 h-3.5" />
                  Upload PDF
                </button>
                <button 
                  onClick={() => wordInputRef.current?.click()}
                  className="bg-blue-600 text-white text-xs font-semibold px-3 py-2 rounded-lg hover:bg-blue-700 transition-all flex items-center gap-2 shadow-md"
                >
                  <FileOutput className="w-3.5 h-3.5" />
                  Import Word Scripts
                </button>
                <input type="file" accept=".pdf" className="hidden" ref={pdfInputRef} onChange={handlePdfUpload} />
                <input type="file" accept=".docx" className="hidden" ref={wordInputRef} onChange={handleWordUpload} />
                <input type="file" multiple accept="audio/*" className="hidden" ref={audioBulkInputRef} onChange={handleBulkAudioUpload} />
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-6 py-8 flex-grow w-full">
            <div className="mb-8 bg-indigo-50 border border-indigo-100 rounded-2xl p-5 flex gap-4">
              <div className="mt-1">
                <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                  <Upload className="w-4 h-4 text-indigo-600" />
                </div>
              </div>
              <div className="flex-1">
                <h3 className="font-semibold text-indigo-900 mb-1">Standard Professional Workflow</h3>
                <p className="text-sm text-indigo-800/80 mb-4 leading-relaxed">
                  1. <b>Upload PDF</b> for perfect slide images. 2. <b>Download Template</b> and fill your scripts in Word. 3. <b>Import Word Scripts</b> back here. 4. <b>Compile</b>!
                </p>
                <div className="flex gap-3">
                  <button 
                    onClick={() => pdfInputRef.current?.click()}
                    className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold px-5 py-2.5 rounded-xl transition-all shadow-lg shadow-indigo-200 flex items-center gap-2 active:scale-95"
                  >
                    <FileText className="w-4 h-4" />
                    Upload PDF Slides
                  </button>
                  <button 
                    onClick={downloadWordTemplate}
                    className="bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 text-sm font-bold px-5 py-2.5 rounded-xl transition-all flex items-center gap-2"
                  >
                    <Download className="w-4 h-4" />
                    Download Script Template
                  </button>
                </div>
              </div>
            </div>

            <div className="space-y-6 mb-12">
              {slides.map((slide, index) => (
                <div key={slide.id} className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col md:flex-row transition-all hover:shadow-md hover:border-indigo-200 group">
                  
                  <div className="md:w-1/3 bg-slate-50 border-r border-slate-100 relative min-h-[220px] flex items-center justify-center p-4">
                    {slide.imagePreviewUrl ? (
                      <>
                        <img src={slide.imagePreviewUrl} alt={`Slide ${index + 1}`} className="max-h-full max-w-full rounded-lg shadow-sm object-contain" />
                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-lg">
                          <label className="cursor-pointer bg-white text-slate-800 text-xs font-bold px-4 py-2 rounded-xl shadow-lg flex items-center gap-2 hover:bg-slate-50 transition-all active:scale-95">
                            <Upload className="w-3.5 h-3.5" /> Change
                            <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(slide.id, e)} />
                          </label>
                        </div>
                      </>
                    ) : (
                      <label className="cursor-pointer w-full h-full min-h-[180px] border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center text-slate-400 hover:bg-white hover:border-indigo-400 hover:text-indigo-600 transition-all">
                        <Presentation className="w-10 h-10 mb-2 opacity-30" />
                        <span className="text-xs font-bold uppercase tracking-wider">Empty Slide</span>
                        <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(slide.id, e)} />
                      </label>
                    )}
                    <div className="absolute top-4 left-4 bg-slate-900 text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full shadow-lg">
                      {index + 1}
                    </div>
                    
                    <div className="absolute top-4 right-4 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button 
                        onClick={() => handleMoveSlide(index, -1)}
                        disabled={index === 0}
                        className="w-8 h-8 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-slate-600 hover:text-indigo-600 disabled:opacity-30 shadow-sm"
                      >
                        <ArrowUp className="w-4 h-4" />
                      </button>
                      <button 
                        onClick={() => handleMoveSlide(index, 1)}
                        disabled={index === slides.length - 1}
                        className="w-8 h-8 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-slate-600 hover:text-indigo-600 disabled:opacity-30 shadow-sm"
                      >
                        <ArrowDown className="w-4 h-4" />
                      </button>
                    </div>
                  </div>

                  <div className="p-6 flex-1 flex flex-col">
                    <div className="flex justify-between items-center mb-3">
                      <label className="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <FileText className="w-3.5 h-3.5" /> Script
                      </label>
                      <button 
                        onClick={() => handleRemoveSlide(slide.id)}
                        className="text-slate-300 hover:text-red-500 transition-colors p-1"
                      >
                    <Trash2 className="w-4 h-4" />
                      </button>
                    </div>
                    
                    <div className="relative flex-1 group/script">
                      <textarea 
                        className="w-full h-full min-h-[120px] bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm resize-none focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:bg-white transition-all placeholder:text-slate-300 font-medium leading-relaxed"
                        placeholder="Paste your slide script here or edit its contents..."
                        value={slide.script || ""}
                        onChange={(e) => updateSlide(slide.id, { script: e.target.value })}
                      />
                      <button 
                        onClick={async () => {
                          const text = await navigator.clipboard.readText();
                          if (text) updateSlide(slide.id, { script: text });
                        }}
                        className="absolute bottom-4 right-4 bg-white border border-slate-200 text-[10px] font-bold px-2 py-1 rounded-md opacity-0 group-focus-within/script:opacity-100 hover:bg-slate-50 transition-all flex items-center gap-1 shadow-sm"
                      >
                        <Clipboard className="w-3 h-3" /> Paste
                      </button>
                    </div>

                    <div className="mt-5 flex flex-wrap items-center justify-between gap-4 pt-4 border-t border-slate-50">
                      <div className="flex items-center gap-3">
                        {slide.audioUrl ? (
                          <div className="flex items-center gap-2 bg-emerald-50 border border-emerald-100 px-3 py-1.5 rounded-xl">
                            <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            <span className="text-[10px] font-bold text-emerald-700 truncate max-w-[120px]">{slide.audioName || 'Audio Ready'}</span>
                            <button onClick={() => playAudio(slide.audioUrl)} className="text-emerald-600 hover:text-emerald-800"><Play className="w-4 h-4" /></button>
                          </div>
                        ) : (
                          <span className="text-[10px] font-bold text-slate-300 uppercase italic">No Audio Uploaded</span>
                        )}
                      </div>
                      
                      <div className="flex items-center gap-2">
                        <button 
                          onClick={() => speakText(slide.script, selectedVoice)}
                          className="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 text-xs font-bold px-4 py-2.5 rounded-xl transition-all flex items-center gap-2"
                        >
                          <Play className="w-3.5 h-3.5" /> Listen
                        </button>
                        <label className="cursor-pointer bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold px-4 py-2.5 rounded-xl transition-all flex items-center gap-2 shadow-md active:scale-95">
                          <Mic className="w-3.5 h-3.5" /> {slide.audioUrl ? "Replace Audio" : "Upload Audio"}
                          <input type="file" accept="audio/*" className="hidden" onChange={(e) => handleAudioUpload(slide.id, e)} />
                        </label>
                      </div>
                    </div>
                  </div>
                </div>
              ))}

              <button 
                onClick={handleAddSlide}
                className="w-full py-6 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold flex items-center justify-center gap-2 hover:bg-white hover:border-indigo-400 hover:text-indigo-600 transition-all group"
              >
                <Plus className="w-5 h-5 group-hover:scale-125 transition-transform" /> Add Slide
              </button>
            </div>
          </main>

          {showImportModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
              <div className="bg-white rounded-[2rem] max-w-lg w-full shadow-2xl overflow-hidden animate-in zoom-in duration-200 border border-slate-100">
                <div className="p-8 pb-4 flex justify-between items-center">
                  <h2 className="text-xl font-black text-slate-900">Bulk Import Scripts</h2>
                  <button onClick={() => setShowImportModal(false)} className="text-slate-400 hover:text-slate-600 p-2 bg-slate-50 rounded-full transition-colors"><X className="w-5 h-5" /></button>
                </div>
                <div className="p-8 pt-0">
                  <p className="text-sm text-slate-500 mb-4 leading-relaxed">Paste the JSON array or list of sentences generated by your AI below. We will match them Slide-by-Slide.</p>
                  <textarea 
                    className="w-full h-64 bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm font-mono focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:bg-white transition-all mb-6"
                    placeholder='["Slide 1 script...", "Slide 2 script..."]'
                    value={importText}
                    onChange={(e) => setImportText(e.target.value)}
                  />
                  <div className="flex gap-3">
                    <button 
                      onClick={handleImportScripts}
                      className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-200 active:scale-95"
                    >
                      Process & Import
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-20">
            <div className="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="text-sm text-slate-500 font-medium flex items-center gap-4">
                <span>Total Slides: <span className="text-slate-900">{slides.length}</span></span>
                <div className="h-4 w-px bg-slate-200"></div>
                <div className="flex items-center gap-2">
                  <span className="text-[10px] uppercase font-bold text-slate-400">Voice:</span>
                  <button 
                    onClick={() => setShowVoiceModal(true)}
                    className="bg-slate-50 border border-slate-200 text-xs font-semibold px-3 py-1.5 rounded-md hover:border-indigo-400 transition-all flex items-center gap-2"
                  >
                    <Sparkles className="w-3 h-3 text-indigo-500" />
                    {browserVoices.find(v => v.voiceURI === selectedVoice)?.name || "Select Voice"}
                  </button>
                </div>
              </div>
              
              <button 
                onClick={compileVideo}
                disabled={isCompiling || slides.length === 0}
                className="w-full sm:w-auto bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 disabled:from-slate-300 disabled:to-slate-300 disabled:cursor-not-allowed text-white font-semibold px-8 py-3 rounded-xl shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2"
              >
                {isCompiling ? (
                  <><Loader2 className="w-5 h-5 animate-spin" /> {compilationProgress}</>
                ) : (
                  <><Video className="w-5 h-5" /> Compile Video</>
                )}
              </button>
            </div>
          </div>

          {showVoiceModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
              <div className="bg-white rounded-[2rem] max-w-2xl w-full max-h-[80vh] shadow-2xl overflow-hidden animate-in zoom-in duration-200 border border-slate-100 flex flex-col">
                <div className="p-8 pb-4 flex justify-between items-center border-b border-slate-50">
                  <div>
                    <h2 className="text-xl font-black text-slate-900">Professional Voice Library</h2>
                    <p className="text-xs text-slate-500 font-medium">Select a studio-quality or standard voice for your slides</p>
                  </div>
                  <button onClick={() => setShowVoiceModal(false)} className="text-slate-400 hover:text-slate-600 p-2 bg-slate-50 rounded-full transition-colors"><X className="w-5 h-5" /></button>
                </div>
                
                <div className="p-8 overflow-y-auto flex-1">
                  <div className="grid grid-cols-1 gap-4">
                    <div className="mb-4">
                      <h3 className="text-[10px] uppercase font-black text-indigo-500 tracking-widest mb-3">AI Premium Voices (OpenAI)</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {VOICES.map(voice => (
                          <div 
                            key={voice.id} 
                            onClick={() => { setSelectedVoice(voice.id); setShowVoiceModal(false); }}
                            className={`p-4 rounded-2xl border-2 transition-all cursor-pointer group ${selectedVoice === voice.id ? 'border-indigo-600 bg-indigo-50/30' : 'border-slate-100 hover:border-indigo-200 hover:bg-slate-50'}`}
                          >
                            <div className="flex justify-between items-center">
                              <span className="font-bold text-sm text-slate-800">{voice.name}</span>
                              <button 
                                onClick={(e) => { e.stopPropagation(); playVoiceSample(voice.id); }}
                                className="p-2 bg-white rounded-xl shadow-sm border border-slate-100 text-indigo-600 hover:bg-indigo-600 hover:text-white transition-all"
                              >
                                <Play className="w-4 h-4" />
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div>
                      <h3 className="text-[10px] uppercase font-black text-emerald-500 tracking-widest mb-3">Standard System Voices</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {browserVoices.map(voice => (
                          <div 
                            key={voice.voiceURI} 
                            onClick={() => { setSelectedVoice(voice.voiceURI); setShowVoiceModal(false); }}
                            className={`p-4 rounded-2xl border-2 transition-all cursor-pointer group ${selectedVoice === voice.voiceURI ? 'border-emerald-600 bg-emerald-50/30' : 'border-slate-100 hover:border-emerald-200 hover:bg-slate-50'}`}
                          >
                            <div className="flex justify-between items-center">
                              <div className="flex flex-col">
                                <span className="font-bold text-sm text-slate-800 truncate max-w-[140px]">{voice.name}</span>
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">{voice.lang}</span>
                              </div>
                              <button 
                                onClick={(e) => { e.stopPropagation(); playVoiceSample(voice.voiceURI); }}
                                className="p-2 bg-white rounded-xl shadow-sm border border-slate-100 text-emerald-600 hover:bg-emerald-600 hover:text-white transition-all"
                              >
                                <Play className="w-4 h-4" />
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="p-8 bg-slate-50 border-t border-slate-100">
                  <p className="text-[10px] text-slate-400 font-medium leading-relaxed">
                    <b>Note:</b> Standard voices vary by browser. For best quality and recordable audio, use AI Premium voices with an OpenAI API key.
                  </p>
                </div>
              </div>
            </div>
          )}

          {finalVideoUrl && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
              <div className="bg-white rounded-3xl max-w-4xl w-full shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                  <h2 className="text-2xl font-bold text-slate-900">Your Video is Ready!</h2>
                  <button 
                    onClick={() => setFinalVideoUrl(null)}
                    className="text-slate-400 hover:text-slate-600 p-2"
                  >
                    <X className="w-5 h-5" />
                  </button>
                </div>
                
                <div className="bg-slate-100 p-6 flex justify-center">
                  <video 
                    src={finalVideoUrl} 
                    controls 
                    className="max-h-[50vh] rounded-xl shadow-md bg-black"
                  />
                </div>
                
                <div className="p-6 flex justify-end gap-3 bg-slate-50 border-t border-slate-100">
                  <button 
                    onClick={() => setFinalVideoUrl(null)}
                    className="px-5 py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-200 transition-colors"
                  >
                    Back to Editor
                  </button>
                  <a 
                    href={finalVideoUrl} 
                    download="Presentation_Video.webm"
                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-xl flex items-center gap-2 shadow-md hover:shadow-lg transition-all"
                  >
                    <Download className="w-5 h-5" /> Download Video
                  </a>
                </div>
              </div>
            </div>
          )}

          <div className="h-24"></div> 
        </div>
      );
    }

    class AppErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error("ErrorBoundary caught an error", error, errorInfo);
        this.setState({ errorInfo });
      }

      render() {
        if (this.state.hasError) {
          return (
            <div style={{ padding: '20px', fontFamily: 'sans-serif', backgroundColor: '#fef2f2', color: '#991b1b', height: '100vh' }}>
              <h1 style={{ fontSize: '24px', fontWeight: 'bold' }}>Application Crash Detected</h1>
              <p>The code encountered a critical module or render error. See details below:</p>
              <pre style={{ background: 'white', padding: '10px', marginTop: '10px', border: '1px solid #fca5a5', overflow: 'auto' }}>
                {this.state.error && this.state.error.toString()}
              </pre>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AppErrorBoundary>
        <SlideCasterApp />
      </AppErrorBoundary>
    );
  </script>
</body>
</html>
