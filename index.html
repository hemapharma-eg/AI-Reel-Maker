<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlideCaster - AI Voice-Over-Slides</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/lucide-react@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoom-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-in { animation: var(--anim-name) var(--anim-duration) ease-out; }
    .fade-in { --anim-name: fade-in; --anim-duration: 300ms; }
    .zoom-in { --anim-name: zoom-in; --anim-duration: 300ms; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    // Safety check for Lucide icons to prevent crash if library version mismatch or missing from CDN
    const getSafeIcon = (name) => {
      // Try multiple possible global names used by various CDN versions
      const Lib = (typeof LucideReact !== 'undefined' ? LucideReact : (typeof lucide !== 'undefined' ? lucide : null));
      
      // Try different lookup paths in the object
      if (Lib) {
        if (Lib[name]) return Lib[name];
        // Some versions put components inside an 'icons' sub-object
        if (Lib.icons && Lib.icons[name]) return Lib.icons[name];
        // Handle case sensitivity variations
        const lowerName = name.toLowerCase();
        for (let key in Lib) {
          if (key.toLowerCase() === lowerName) return Lib[key];
        }
      }

      // Final bulletproof fallback: Simple SVG icon so the app never crashes
      return (props) => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
          <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
      );
    };

    const Play = getSafeIcon('Play');
    const Video = getSafeIcon('Video');
    const Plus = getSafeIcon('Plus');
    const Trash2 = getSafeIcon('Trash2');
    const Presentation = getSafeIcon('Presentation');
    const Mic = getSafeIcon('Mic');
    const Download = getSafeIcon('Download');
    const Loader2 = getSafeIcon('Loader2');
    const Upload = getSafeIcon('Upload');
    const Settings = getSafeIcon('Settings');
    const Sparkles = getSafeIcon('Sparkles');

    const apiKey = ""; // Will be provided by environment

    // --- Config & Utils ---
    const VOICES = [
      "Zephyr", "Puck", "Charon", "Kore", "Fenrir", "Leda", "Orus", "Aoede", 
      "Callirrhoe", "Autonoe", "Enceladus", "Iapetus", "Umbriel", "Algieba", 
      "Despina", "Erinome", "Algenib", "Rasalgethi", "Laomedeia", "Achernar", 
      "Alnilam", "Schedar", "Gacrux", "Pulcherrima", "Achird", "Zubenelgenubi", 
      "Vindemiatrix", "Sadachbia", "Sadaltager", "Sulafat"
    ];

    // Resilient Fetch with Model Waterfall and 429 Retry
    async function fetchGemini(models, payload, apiKey) {
      let lastError = null;
      for (const model of models) {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            const error = new Error(errData.error?.message || `API Error ${res.status}`);
            error.status = res.status;
            error.model = model;
            throw error;
          }
          return await res.json();
        } catch (e) {
          lastError = e;
          if (e.status === 429) {
            console.warn(`Quota exceeded for ${model}. Waiting 2s before fallback...`);
            await new Promise(r => setTimeout(r, 2000));
          } else {
            console.warn(`Fallback: ${model} failed (${e.status}). Trying next...`);
          }
          // Retry on 404 (Not Found), 429 (Quota), 500+ (Server Error)
          if (![404, 429, 500, 503, 504].includes(e.status)) break;
        }
      }
      throw lastError;
    }

    // Utility: Convert raw PCM Base64 to WAV Blob
    function base64ToWav(base64, sampleRate = 24000) {
      const binaryString = atob(base64);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      const buffer = bytes.buffer; 

      const wavBuffer = new ArrayBuffer(44 + buffer.byteLength);
      const view = new DataView(wavBuffer);

      const writeString = (v, offset, string) => {
        for (let i = 0; i < string.length; i++) {
          v.setUint8(offset + i, string.charCodeAt(i));
        }
      };

      const numChannels = 1;
      const byteRate = sampleRate * numChannels * 2;
      const blockAlign = numChannels * 2;

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + buffer.byteLength, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true); // Subchunk1Size
      view.setUint16(20, 1, true); // AudioFormat (1 = PCM)
      view.setUint16(22, numChannels, true); // NumChannels
      view.setUint32(24, sampleRate, true); // SampleRate
      view.setUint32(28, byteRate, true); // ByteRate
      view.setUint16(32, blockAlign, true); // BlockAlign
      view.setUint16(34, 16, true); // BitsPerSample
      writeString(view, 36, 'data');
      view.setUint32(40, buffer.byteLength, true); // Subchunk2Size

      new Uint8Array(wavBuffer, 44).set(new Uint8Array(buffer));

      return new Blob([wavBuffer], { type: 'audio/wav' });
    }

    // API Call for TTS
    async function generateTTS(text, voiceName, userApiKey) {
      const payload = {
        contents: [{ parts: [{ text }] }],
        generationConfig: {
          responseModalities: ["AUDIO"],
          speechConfig: {
            voiceConfig: {
              prebuiltVoiceConfig: { voiceName }
            }
          }
        }
      };

      const data = await fetchGemini(['gemini-2.0-flash-exp', 'gemini-1.5-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-flash-8b'], payload, userApiKey);
      const part = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
      if (!part) throw new Error("No audio data returned");

      const mimeType = part.mimeType || "audio/L16; rate=24000";
      const rateMatch = mimeType.match(/rate=(\d+)/);
      const rate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;

      return base64ToWav(part.data, rate);
    }

    // Utility: Convert File to Base64 for Gemini API
    const fileToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = error => reject(error);
    });

    // Main Application Component
    function SlideCasterApp() {
      const [view, setView] = useState('home'); // 'home' or 'app'
      const [aiStatus, setAiStatus] = useState('idle'); // 'idle', 'ready', 'skipped'
      const [userApiKey, setUserApiKey] = useState('');

      const [globalVoice, setGlobalVoice] = useState("Kore");

      const [slides, setSlides] = useState([
        { 
          id: 1, 
          imageFile: null, 
          imagePreviewUrl: null, 
          script: "", 
          audioBlob: null, 
          audioUrl: null, 
          isGenerating: false, 
          voice: "Kore", // safely hardcoded fallback
          isGeneratingScript: false,
          scriptGenerationProgress: ""
        }
      ]);
      
      const [isCompiling, setIsCompiling] = useState(false);
      const [compilationProgress, setCompilationProgress] = useState("");
      const [finalVideoUrl, setFinalVideoUrl] = useState(null);

      const fileInputRef = useRef(null);

      const handleAddSlide = () => {
        setSlides(prev => [...prev, { 
          id: Date.now() + Math.random(), 
          imageFile: null, 
          imagePreviewUrl: null, 
          script: "", 
          audioBlob: null, 
          audioUrl: null, 
          isGenerating: false,
          voice: globalVoice,
          isGeneratingScript: false,
          scriptGenerationProgress: ""
        }]);
      };

      const handleRemoveSlide = (id) => {
        setSlides(prev => prev.filter(s => s.id !== id));
      };

      const updateSlide = (id, updates) => {
        setSlides(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
      };

      const handleImageUpload = (id, e) => {
        const files = e.target.files;
        if (files && files.length > 0) {
          const file = files[0];
          const previewUrl = URL.createObjectURL(file);
          updateSlide(id, { imageFile: file, imagePreviewUrl: previewUrl });
        }
      };

      const handleBulkImageUpload = (e) => {
        const files = e.target.files ? Array.from(e.target.files) : [];
        if (files.length === 0) return;

        const newSlides = files.map((file, index) => ({
          id: Date.now() + index + Math.random(),
          imageFile: file,
          imagePreviewUrl: URL.createObjectURL(file),
          script: "",
          audioBlob: null,
          audioUrl: null,
          isGenerating: false,
          voice: globalVoice,
          isGeneratingScript: false,
          scriptGenerationProgress: ""
        }));

        setSlides(prev => {
          if (prev.length === 1 && !prev[0].imageFile && !prev[0].script) {
            return newSlides;
          } else {
            return [...prev, ...newSlides];
          }
        });
        
        if (fileInputRef.current) {
          fileInputRef.current.value = '';
        }
      };

      const startWithAI = () => {
        if (!userApiKey.trim()) {
          alert("Please enter a valid Gemini API Key.");
          return;
        }
        setAiStatus('ready');
        setView('app');
      };
      
      const skipAI = () => {
        setAiStatus('skipped');
        setView('app');
      };

      const autoGenerateScript = async (id) => {
        const slide = slides.find(s => s.id === id);
        if (!slide || !slide.imageFile) {
          alert("Please upload an image for this slide first.");
          return;
        }

        if (aiStatus !== 'ready' || !userApiKey) {
          alert("AI was skipped or no API key provided. Please reload the app to enter your key.");
          return;
        }

        updateSlide(id, { isGeneratingScript: true, scriptGenerationProgress: 'Analyzing Slide...' });

        try {
          const base64Image = await fileToBase64(slide.imageFile);
          const payload = {
            contents: [{
              parts: [
                { text: "Act as an expert educator. Look at this presentation slide and provide a comprehensive, clear, and easy-to-understand explanation for students. Your explanation should be detailed enough that students will not need extra support to understand the concept shown. Aim for a thorough narrative style (about 5-8 sentences) that covers all key details, context, and implications. Return only the script text." },
                { inlineData: { mimeType: slide.imageFile.type, data: base64Image } }
              ]
            }]
          };

          const data = await fetchGemini(['gemini-1.5-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-flash-8b', 'gemini-2.0-flash-exp'], payload, userApiKey);
          const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;

          if (generatedText) {
             updateSlide(id, { script: generatedText.trim(), isGeneratingScript: false, scriptGenerationProgress: '' });
          } else {
             throw new Error("No text generated by AI");
          }
        } catch (err) {
          console.error("Gemini AI Generation failed:", err);
          alert("Failed to auto-generate script. " + err.message);
          updateSlide(id, { isGeneratingScript: false, scriptGenerationProgress: '' });
        }
      };

      const generateAudioForSlide = async (id) => {
        const slide = slides.find(s => s.id === id);
        if (!slide || !(slide.script || "").trim()) return;

        updateSlide(id, { isGenerating: true });
        try {
          const audioBlob = await generateTTS(slide.script, slide.voice, userApiKey);
          const audioUrl = URL.createObjectURL(audioBlob);
          updateSlide(id, { audioBlob, audioUrl, isGenerating: false });
        } catch (error) {
          console.error("Audio generation failed:", error);
          updateSlide(id, { isGenerating: false });
          alert("Failed to generate audio. Please check your script and try again.");
        }
      };

      const playAudio = (url) => {
        if (!url) return;
        const audio = new Audio(url);
        audio.play().catch(e => console.error("Audio playback failed:", e));
      };

      const compileVideo = async () => {
        if (slides.length === 0) return;
        setIsCompiling(true);
        setCompilationProgress("Initializing canvas...");

        try {
          const canvas = document.createElement('canvas');
          canvas.width = 1280;
          canvas.height = 720;
          const ctx = canvas.getContext('2d');

          const getStream = canvas.captureStream || canvas.mozCaptureStream;
          if (!getStream) {
            throw new Error("Your browser does not support canvas video export. Try Chrome or Edge.");
          }
          
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) {
            throw new Error("Your browser does not support AudioContext.");
          }

          const audioCtx = new AudioContextClass();
          const dest = audioCtx.createMediaStreamDestination();

          const canvasStream = getStream.call(canvas, 30); 
          const combinedStream = new MediaStream([
            ...canvasStream.getVideoTracks(),
            ...dest.stream.getAudioTracks()
          ]);

          let options = { mimeType: 'video/webm;codecs=vp9,opus' };
          if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/webm' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
              options = { mimeType: 'video/mp4' };
            }
          }

          const recorder = new MediaRecorder(combinedStream, options);
          const chunks = [];
          recorder.ondataavailable = e => {
            if (e.data && e.data.size > 0) chunks.push(e.data);
          };

          const recordPromise = new Promise(resolve => {
            recorder.onstop = () => resolve(new Blob(chunks, { type: options.mimeType }));
          });

          recorder.start();

          let isRecording = true;
          let currentSlideVisual = null;

          const renderLoop = () => {
            if (!isRecording) return;
            
            ctx.fillStyle = '#0f172a'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentSlideVisual) {
              const imageAreaW = 920;
              const sidebarW = 360;
              
              ctx.fillStyle = '#1e293b';
              ctx.fillRect(0, 0, imageAreaW, canvas.height);

              if (currentSlideVisual.img) {
                const img = currentSlideVisual.img;
                const scale = Math.min(imageAreaW / img.width, canvas.height / img.height);
                const w = img.width * scale;
                const h = img.height * scale;
                const x = (imageAreaW - w) / 2;
                const y = (canvas.height - h) / 2;
                ctx.drawImage(img, x, y, w, h);
              } else {
                ctx.fillStyle = '#f8fafc';
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(currentSlideVisual.text, imageAreaW / 2, canvas.height / 2);
              }

              ctx.strokeStyle = '#334155';
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.moveTo(imageAreaW, 0);
              ctx.lineTo(imageAreaW, canvas.height);
              ctx.stroke();

              if (currentSlideVisual.sentences && currentSlideVisual.duration > 0) {
                const elapsed = performance.now() - currentSlideVisual.startTime;
                const progress = Math.min(1, Math.max(0, elapsed / currentSlideVisual.duration));
                
                const totalSentences = currentSlideVisual.sentences.length;
                const visibleCount = Math.min(totalSentences, Math.floor(progress * totalSentences) + 1);

                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                
                let currentY = 40;
                const startX = imageAreaW + 30;
                const maxTextW = sidebarW - 60;

                for (let j = 0; j < totalSentences; j++) {
                  if (j < visibleCount) {
                    const isCurrent = j === visibleCount - 1;
                    ctx.fillStyle = isCurrent ? '#ffffff' : '#94a3b8';
                    ctx.font = (isCurrent ? 'bold ' : '') + '22px sans-serif';
                    
                    const words = currentSlideVisual.sentences[j].split(' ');
                    let line = '';
                    
                    for(let n = 0; n < words.length; n++) {
                      const testLine = line + words[n] + ' ';
                      const metrics = ctx.measureText(testLine);
                      if (metrics.width > maxTextW && n > 0) {
                        ctx.fillText(line, startX, currentY);
                        line = words[n] + ' ';
                        currentY += 30;
                      } else {
                        line = testLine;
                      }
                    }
                    ctx.fillText(line, startX, currentY);
                    currentY += 40; 
                  }
                }
              }
            }
            requestAnimationFrame(renderLoop);
          };
          
          requestAnimationFrame(renderLoop);

          for (let i = 0; i < slides.length; i++) {
            const slide = slides[i];
            setCompilationProgress(`Processing slide ${i + 1} of ${slides.length}...`);
            
            const sentenceRegex = /[^.!?]+[.!?]+|\s*$/g;
            const rawSentences = slide.script ? slide.script.match(sentenceRegex) : [];
            const sentences = rawSentences ? rawSentences.map(s => s.trim()).filter(Boolean) : [];
            if (sentences.length === 0 && slide.script) sentences.push(slide.script);

            let slideImg = null;
            if (slide.imagePreviewUrl) {
              slideImg = new Image();
              slideImg.src = slide.imagePreviewUrl;
              await new Promise((resolve) => { 
                slideImg.onload = resolve; 
                slideImg.onerror = () => {
                  console.warn(`Failed to load image for slide ${i+1}`);
                  resolve(); 
                };
              });
            }

            let audioDurationMs = 3000; 
            let audioBuffer = null;

            if (slide.audioBlob) {
              try {
                const arrayBuffer = await slide.audioBlob.arrayBuffer();
                audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                audioDurationMs = audioBuffer.duration * 1000;
              } catch (audioErr) {
                console.error(`Audio processing failed for slide ${i+1}:`, audioErr);
              }
            } else if (slide.script) {
               audioDurationMs = Math.max(3000, slide.script.length * 60);
            }

            currentSlideVisual = { 
              img: slideImg, 
              text: `Slide ${i + 1} (No Image)`,
              sentences: sentences,
              duration: audioDurationMs,
              startTime: performance.now()
            };

            if (audioBuffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(dest);
                source.start();
                await new Promise(r => { source.onended = r; });
            } else {
                await new Promise(r => setTimeout(r, audioDurationMs));
            }
          }

          setCompilationProgress("Finalizing video file...");
          isRecording = false; 
          recorder.stop();
          
          const finalBlob = await recordPromise;
          setFinalVideoUrl(URL.createObjectURL(finalBlob));
          
          if (audioCtx.state !== 'closed') {
            await audioCtx.close();
          }

        } catch (err) {
          console.error("Compilation failed:", err);
          alert(err.message || "Video compilation failed. See console for details.");
        } finally {
          setIsCompiling(false);
          setCompilationProgress("");
        }
      };

      if (view === 'home') {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6 font-sans text-slate-800">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100 text-center animate-in fade-in zoom-in duration-300">
              <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-200">
                <Sparkles className="text-white w-8 h-8" />
              </div>
              
              <h1 className="text-2xl font-bold text-slate-900 mb-3">Welcome to SlideCaster</h1>
              
              <p className="text-slate-600 mb-6 text-sm leading-relaxed">
                To use automatic slide script generation, please provide your <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="text-indigo-600 font-semibold hover:underline">Gemini API Key</a>. Your key is securely used locally and never stored on our servers.
              </p>

              <div className="mb-8 text-left">
                <label className="block text-sm font-semibold text-slate-700 mb-2">Gemini API Key</label>
                <input 
                  type="password" 
                  value={userApiKey}
                  onChange={(e) => setUserApiKey(e.target.value)}
                  placeholder="AIzaSy..."
                  className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all"
                />
                <p className="mt-2 text-xs text-slate-500">
                  Don't have one? <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="text-indigo-500 hover:underline">Get it here for free.</a>
                </p>
              </div>

              <div className="flex flex-col gap-3">
                <button
                  onClick={startWithAI}
                  disabled={!userApiKey.trim()}
                  className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white font-semibold py-3 px-4 rounded-xl transition-colors shadow-md flex items-center justify-center gap-2"
                >
                  Save Key & Start
                </button>
                <button
                  onClick={skipAI}
                  className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-3 px-4 rounded-xl transition-colors"
                >
                  Skip AI (Type manually)
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 flex flex-col">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10 flex-shrink-0">
            <div className="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-inner">
                  <Video className="text-white w-5 h-5" />
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight text-slate-900">SlideCaster</h1>
                  <p className="text-xs text-slate-500 font-medium">Turn presentations into narrated videos</p>
                </div>
              </div>
              
              <div className="flex items-center gap-4 text-sm">
                <div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                  <Settings className="w-4 h-4 text-slate-500" />
                  <span className="text-slate-600 font-medium">Global Voice:</span>
                  <select 
                    value={globalVoice}
                    onChange={(e) => {
                      setGlobalVoice(e.target.value);
                      setSlides(slides.map(s => ({ ...s, voice: e.target.value })));
                    }}
                    className="bg-transparent font-semibold text-indigo-700 outline-none"
                  >
                    {VOICES.map(v => <option key={v} value={v}>{v}</option>)}
                  </select>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-6 py-8 flex-grow w-full">
            <div className="mb-8 bg-indigo-50 border border-indigo-100 rounded-2xl p-5 flex gap-4">
              <div className="mt-1">
                <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                  <Upload className="w-4 h-4 text-indigo-600" />
                </div>
              </div>
              <div>
                <h3 className="font-semibold text-indigo-900 mb-1">How it works</h3>
                <p className="text-sm text-indigo-800/80 mb-3">
                  Export your PowerPoint slides as Images (File &gt; Export &gt; Change File Type &gt; JPEG/PNG). Upload them here, type the script for each slide, and we'll generate the voiceover and stitch it all into a high-quality video!
                </p>
                <input 
                  type="file" 
                  multiple 
                  accept="image/*" 
                  className="hidden" 
                  ref={fileInputRef}
                  onChange={handleBulkImageUpload}
                />
                <button 
                  onClick={() => fileInputRef.current?.click()}
                  className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors flex items-center gap-2"
                >
                  <Presentation className="w-4 h-4" />
                  Bulk Upload Slide Images
                </button>
              </div>
            </div>

            <div className="space-y-6 mb-12">
              {slides.map((slide, index) => (
                <div key={slide.id} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col md:flex-row transition-all hover:shadow-md">
                  
                  <div className="md:w-1/3 bg-slate-100 border-r border-slate-200 relative group min-h-[200px] flex items-center justify-center p-4">
                    {slide.imagePreviewUrl ? (
                      <>
                        <img src={slide.imagePreviewUrl} alt={`Slide ${index + 1}`} className="max-h-full max-w-full rounded shadow-sm object-contain" />
                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                          <label className="cursor-pointer bg-white text-slate-800 text-sm font-medium px-4 py-2 rounded-lg shadow flex items-center gap-2 hover:bg-slate-50 transition-colors">
                            <Upload className="w-4 h-4" /> Change Image
                            <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(slide.id, e)} />
                          </label>
                        </div>
                      </>
                    ) : (
                      <label className="cursor-pointer w-full h-full min-h-[160px] border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center text-slate-500 hover:bg-slate-50 hover:border-indigo-400 hover:text-indigo-600 transition-colors">
                        <Presentation className="w-8 h-8 mb-2 opacity-50" />
                        <span className="text-sm font-medium">Upload Slide Image</span>
                        <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(slide.id, e)} />
                      </label>
                    )}
                    <div className="absolute top-3 left-3 bg-white/90 backdrop-blur text-slate-700 text-xs font-bold px-2 py-1 rounded shadow-sm border border-slate-200/50">
                      {index + 1}
                    </div>
                  </div>

                  <div className="p-5 flex-1 flex flex-col">
                    <div className="flex justify-between items-center mb-2">
                      <label className="text-sm font-semibold text-slate-700 flex items-center gap-2">
                        <Mic className="w-4 h-4 text-slate-400" /> Voiceover Script
                      </label>
                      
                      <div className="flex items-center gap-2">
                        <button 
                          onClick={() => autoGenerateScript(slide.id)}
                          disabled={!slide.imagePreviewUrl || slide.isGeneratingScript || aiStatus !== 'ready'}
                          className="text-xs font-medium bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-3 py-1.5 rounded-md flex items-center gap-1.5 transition-colors disabled:opacity-50 disabled:cursor-not-allowed border border-indigo-100"
                          title={aiStatus === 'ready' ? "Generate comprehensive educational explanation" : "AI was skipped. Reload to enable."}
                        >
                          {slide.isGeneratingScript ? (
                             <><Loader2 className="w-3 h-3 animate-spin" /> {slide.scriptGenerationProgress || 'Analyzing...'}</>
                          ) : (
                             <><Sparkles className="w-3 h-3" /> Auto-Generate Script</>
                          )}
                        </button>
                        
                        <button 
                          onClick={() => handleRemoveSlide(slide.id)}
                          className="text-slate-400 hover:text-red-500 transition-colors p-1"
                          title="Remove Slide"
                        >
                          <Trash2 className="w-4 h-4" />
                        </button>
                      </div>
                    </div>
                    
                    <textarea 
                      className="w-full flex-1 min-h-[100px] bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all placeholder:text-slate-400"
                      placeholder="Type the script you want spoken during this slide..."
                      value={slide.script}
                      onChange={(e) => updateSlide(slide.id, { script: e.target.value })}
                    />

                    <div className="mt-4 flex flex-wrap items-center justify-between gap-4 border-t border-slate-100 pt-4">
                      <div className="flex items-center gap-2">
                        <select 
                          value={slide.voice}
                          onChange={(e) => updateSlide(slide.id, { voice: e.target.value })}
                          className="text-sm bg-white border border-slate-200 text-slate-700 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                        >
                          {VOICES.map(v => <option key={v} value={v}>{v}</option>)}
                        </select>
                      </div>
                      
                      <div className="flex items-center gap-2">
                        {slide.audioUrl && (
                          <button 
                            onClick={() => playAudio(slide.audioUrl)}
                            className="w-9 h-9 flex items-center justify-center rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition-colors"
                            title="Preview Audio"
                          >
                            <Play className="w-4 h-4 ml-0.5" />
                          </button>
                        )}
                        
                        <button 
                          onClick={() => generateAudioForSlide(slide.id)}
                          disabled={!(slide.script || "").trim() || slide.isGenerating}
                          className="bg-slate-900 hover:bg-slate-800 disabled:bg-slate-200 disabled:text-slate-400 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors flex items-center gap-2"
                        >
                          {slide.isGenerating ? (
                             <><Loader2 className="w-4 h-4 animate-spin" /> Generating Voice...</>
                          ) : (
                             <><Mic className="w-4 h-4" /> {slide.audioUrl ? "Regenerate Voice" : "Generate Voice"}</>
                          )}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              ))}

              <button 
                onClick={handleAddSlide}
                className="w-full py-4 border-2 border-dashed border-slate-300 rounded-2xl text-slate-500 font-medium flex items-center justify-center gap-2 hover:bg-slate-50 hover:border-indigo-400 hover:text-indigo-600 transition-all"
              >
                <Plus className="w-5 h-5" /> Add Another Slide
              </button>
            </div>
          </main>

          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-20">
            <div className="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="text-sm text-slate-500 font-medium">
                Total Slides: <span className="text-slate-900">{slides.length}</span>
              </div>
              
              <button 
                onClick={compileVideo}
                disabled={isCompiling || slides.length === 0}
                className="w-full sm:w-auto bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 disabled:from-slate-300 disabled:to-slate-300 disabled:cursor-not-allowed text-white font-semibold px-8 py-3 rounded-xl shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2"
              >
                {isCompiling ? (
                  <><Loader2 className="w-5 h-5 animate-spin" /> {compilationProgress}</>
                ) : (
                  <><Video className="w-5 h-5" /> Compile Video</>
                )}
              </button>
            </div>
          </div>

          {finalVideoUrl && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
              <div className="bg-white rounded-3xl max-w-4xl w-full shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                  <h2 className="text-2xl font-bold text-slate-900">Your Video is Ready!</h2>
                  <button 
                    onClick={() => setFinalVideoUrl(null)}
                    className="text-slate-400 hover:text-slate-600 p-2"
                  >
                    Close
                  </button>
                </div>
                
                <div className="bg-slate-100 p-6 flex justify-center">
                  <video 
                    src={finalVideoUrl} 
                    controls 
                    className="max-h-[50vh] rounded-xl shadow-md bg-black"
                  />
                </div>
                
                <div className="p-6 flex justify-end gap-3 bg-slate-50 border-t border-slate-100">
                  <button 
                    onClick={() => setFinalVideoUrl(null)}
                    className="px-5 py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-200 transition-colors"
                  >
                    Back to Editor
                  </button>
                  <a 
                    href={finalVideoUrl} 
                    download="Presentation_Video.webm"
                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-xl flex items-center gap-2 shadow-md hover:shadow-lg transition-all"
                  >
                    <Download className="w-5 h-5" /> Download Video
                  </a>
                </div>
              </div>
            </div>
          )}

          <div className="h-24"></div> 
        </div>
      );
    }

    class AppErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error("ErrorBoundary caught an error", error, errorInfo);
        this.setState({ errorInfo });
      }

      render() {
        if (this.state.hasError) {
          return (
            <div style={{ padding: '20px', fontFamily: 'sans-serif', backgroundColor: '#fef2f2', color: '#991b1b', height: '100vh' }}>
              <h1 style={{ fontSize: '24px', fontWeight: 'bold' }}>Application Crash Detected</h1>
              <p>The code encountered a critical module or render error. See details below:</p>
              <pre style={{ background: 'white', padding: '10px', marginTop: '10px', border: '1px solid #fca5a5', overflow: 'auto' }}>
                {this.state.error && this.state.error.toString()}
              </pre>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AppErrorBoundary>
        <SlideCasterApp />
      </AppErrorBoundary>
    );
  </script>
</body>
</html>
