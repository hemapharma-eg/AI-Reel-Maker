<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- Safety check for Lucide icons ---
    const getSafeIcon = (name) => {
      const fallbacks = {
        ArrowUp: (props) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m18 15-6-6-6 6"/></svg>
        ),
        ArrowDown: (props) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m6 9 6 6 6-6"/></svg>
        ),
        X: (props) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        ),
        Check: (props) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="20 6 9 17 4 12"/></svg>
        ),
        Download: (props) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        ),
        Sparkles: (props) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        ),
        Video: (props) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
        ),
        Play: (props) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="5 3 19 12 5 21 5 3"/></svg>
        ),
        Mic: (props) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        ),
        Plus: (props) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        )
      };

      if (fallbacks[name]) return fallbacks[name];
      const Lib = (typeof LucideReact !== 'undefined' ? LucideReact : (typeof lucide !== 'undefined' ? lucide : null));
      if (Lib) {
        // In Lucide React UMD, icons might be directly on the global LucideReact object
        const icon = Lib[name] || (Lib.icons && Lib.icons[name]);
        if (typeof icon === 'function' || typeof icon === 'string') return icon;

        const lowerName = name.toLowerCase();
        for (let key in Lib) { 
          if (key.toLowerCase() === lowerName && (typeof Lib[key] === 'function')) return Lib[key]; 
        }
      }
      return (props) => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>
      );
    };

    const PlayIcon = getSafeIcon('Play');
    const VideoIcon = getSafeIcon('Video');
    const PlusIcon = getSafeIcon('Plus');
    const TrashIcon = getSafeIcon('Trash2');
    const PresentationIcon = getSafeIcon('Presentation');
    const MicIcon = getSafeIcon('Mic');
    const DownloadIcon = getSafeIcon('Download');
    const LoaderIcon = getSafeIcon('Loader2');
    const UploadIcon = getSafeIcon('Upload');
    const SettingsIcon = getSafeIcon('Settings');
    const SparklesIcon = getSafeIcon('Sparkles');
    const ChevronUpIcon = getSafeIcon('ArrowUp');
    const ChevronDownIcon = getSafeIcon('ArrowDown');
    const XIcon = getSafeIcon('X');
    const CheckIcon = getSafeIcon('Check');

    const VOICES = [
      "Zephyr", "Puck", "Charon", "Kore", "Fenrir", "Leda", "Orus", "Aoede", 
      "Callirrhoe", "Autonoe", "Enceladus", "Iapetus", "Umbriel", "Algieba", 
      "Despina", "Erinome", "Algenib", "Rasalgethi", "Laomedeia", "Achernar", 
      "Alnilam", "Schedar", "Gacrux", "Pulcherrima", "Achird", "Zubenelgenubi", 
      "Vindemiatrix", "Sadachbia", "Sadaltager", "Sulafat"
    ];

    // Utility: Convert raw PCM Base64 to WAV Blob
    function base64ToWav(base64, sampleRate = 24000) {
      const binaryString = atob(base64);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      const buffer = bytes.buffer; 

      const wavBuffer = new ArrayBuffer(44 + buffer.byteLength);
      const view = new DataView(wavBuffer);

      const writeString = (v, offset, string) => {
        for (let i = 0; i < string.length; i++) {
          v.setUint8(offset + i, string.charCodeAt(i));
        }
      };

      const numChannels = 1;
      const byteRate = sampleRate * numChannels * 2;
      const blockAlign = numChannels * 2;

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + buffer.byteLength, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, buffer.byteLength, true);

      new Uint8Array(wavBuffer, 44).set(new Uint8Array(buffer));
      return new Blob([wavBuffer], { type: 'audio/wav' });
    }

    // API Call for TTS using Gemini
    async function generateTTS(text, voiceName, userApiKey, retries = 3) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${userApiKey}`;
      const payload = {
        contents: [{ parts: [{ text }] }],
        generationConfig: {
          responseModalities: ["AUDIO"],
          speechConfig: {
            voiceConfig: {
              prebuiltVoiceConfig: { voiceName }
            }
          }
        }
      };

      let delay = 1000;
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (!res.ok) throw new Error(`API Error: ${res.status}`);
          const data = await res.json();
          
          const part = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
          if (!part) throw new Error("No audio data returned");

          const mimeType = part.mimeType || "audio/L16; rate=24000";
          const rateMatch = mimeType.match(/rate=(\d+)/);
          const rate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;

          return base64ToWav(part.data, rate);
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    }

    const fileToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = error => reject(error);
    });

    function SlideCasterApp() {
      const [view, setView] = useState('home'); // 'home' or 'app'
      const [aiStatus, setAiStatus] = useState('idle'); // 'idle', 'ready', 'skipped'
      const [userApiKey, setUserApiKey] = useState('');
      const [globalVoice, setGlobalVoice] = useState("Kore");

      const [slides, setSlides] = useState([
        { 
          id: 1, 
          imageFile: null, 
          imagePreviewUrl: null, 
          script: "", 
          audioBlob: null, 
          audioUrl: null, 
          isGenerating: false, 
          voice: "Kore",
          isGeneratingScript: false,
          scriptGenerationProgress: ""
        }
      ]);
      
      const [isCompiling, setIsCompiling] = useState(false);
      const [compilationProgress, setCompilationProgress] = useState("");
      const [finalVideoUrl, setFinalVideoUrl] = useState(null);
      const [finalExtension, setFinalExtension] = useState("webm");

      const fileInputRef = useRef(null);

      const handleAddSlide = () => {
        setSlides(prev => [...prev, { 
          id: Date.now() + Math.random(), 
          imageFile: null, 
          imagePreviewUrl: null, 
          script: "", 
          audioBlob: null, 
          audioUrl: null, 
          isGenerating: false,
          voice: globalVoice,
          isGeneratingScript: false,
          scriptGenerationProgress: ""
        }]);
      };

      const handleRemoveSlide = (id) => {
        setSlides(prev => prev.filter(s => s.id !== id));
      };

      const updateSlide = (id, updates) => {
        setSlides(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
      };

      const handleImageUpload = (id, e) => {
        const files = e.target.files;
        if (files && files.length > 0) {
          const file = files[0];
          const previewUrl = URL.createObjectURL(file);
          updateSlide(id, { imageFile: file, imagePreviewUrl: previewUrl });
        }
      };

      const handleBulkImageUpload = (e) => {
        const files = e.target.files ? Array.from(e.target.files) : [];
        if (files.length === 0) return;

        const newSlides = files.map((file, index) => ({
          id: Date.now() + index + Math.random(),
          imageFile: file,
          imagePreviewUrl: URL.createObjectURL(file),
          script: "",
          audioBlob: null,
          audioUrl: null,
          isGenerating: false,
          voice: globalVoice,
          isGeneratingScript: false,
          scriptGenerationProgress: ""
        }));

        setSlides(prev => {
          if (prev.length === 1 && !prev[0].imageFile && !prev[0].script) {
            return newSlides;
          } else {
            return [...prev, ...newSlides];
          }
        });
        
        if (fileInputRef.current) {
          fileInputRef.current.value = '';
        }
      };

      const startWithAI = () => {
        if (!userApiKey.trim()) {
          alert("Please enter a valid Gemini API Key.");
          return;
        }
        setAiStatus('ready');
        setView('app');
      };
      
      const skipAI = () => {
        setAiStatus('skipped');
        setView('app');
      };

      const autoGenerateScript = async (id) => {
        const slide = slides.find(s => s.id === id);
        if (!slide || !slide.imageFile) {
          alert("Please upload an image for this slide first.");
          return;
        }

        if (aiStatus !== 'ready' || !userApiKey) {
          alert("AI was skipped or no API key provided. Please reload the app to enter your key.");
          return;
        }

        updateSlide(id, { isGeneratingScript: true, scriptGenerationProgress: 'Analyzing Slide...' });

        try {
          const base64Image = await fileToBase64(slide.imageFile);
          
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [
                  { text: "Act as an expert educator. Look at this presentation slide and provide a comprehensive, clear, and easy-to-understand explanation for students. Your explanation should be detailed enough that students will not need extra support to understand the concept shown. Aim for a thorough narrative style (about 5-8 sentences) that covers all key details, context, and implications. Return only the script text." },
                  { inlineData: { mimeType: slide.imageFile.type, data: base64Image } }
                ]
              }]
            })
          });

          if (!response.ok) {
            throw new Error(`API Error: ${response.status} - Please check if your API key is correct.`);
          }

          const data = await response.json();
          const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;

          if (generatedText) {
             updateSlide(id, { script: generatedText.trim(), isGeneratingScript: false, scriptGenerationProgress: '' });
          } else {
             throw new Error("No text generated by AI");
          }
        } catch (err) {
          console.error("Gemini AI Generation failed:", err);
          alert("Failed to auto-generate script. " + err.message);
          updateSlide(id, { isGeneratingScript: false, scriptGenerationProgress: '' });
        }
      };

      const generateAudioForSlide = async (id) => {
        const slide = slides.find(s => s.id === id);
        if (!slide || !(slide.script || "").trim()) return;

        updateSlide(id, { isGenerating: true });
        try {
          const apiKeyToUse = aiStatus === 'ready' ? userApiKey : "";
          const audioBlob = await generateTTS(slide.script, slide.voice, apiKeyToUse);
          const audioUrl = URL.createObjectURL(audioBlob);
          updateSlide(id, { audioBlob, audioUrl, isGenerating: false });
        } catch (error) {
          console.error("Audio generation failed:", error);
          updateSlide(id, { isGenerating: false });
          alert("Failed to generate audio. Please check your script and API key.");
        }
      };

      const playAudio = (url) => {
        if (!url) return;
        const audio = new Audio(url);
        audio.play().catch(e => console.error("Audio playback failed:", e));
      };

      const compileVideo = async () => {
        if (slides.length === 0) return;
        setIsCompiling(true);
        setCompilationProgress("Initializing canvas...");

        try {
          const canvas = document.createElement('canvas');
          canvas.width = 1280;
          canvas.height = 720;
          const ctx = canvas.getContext('2d');

          const getStream = canvas.captureStream || canvas.mozCaptureStream;
          if (!getStream) throw new Error("Canvas video export not supported.");
          
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          const audioCtx = new AudioContextClass();
          const dest = audioCtx.createMediaStreamDestination();

          const canvasStream = getStream.call(canvas, 30); 
          const combinedStream = new MediaStream([
            ...canvasStream.getVideoTracks(),
            ...dest.stream.getAudioTracks()
          ]);

          let options = { mimeType: 'video/webm;codecs=vp8,opus' };
          
          const possibleMimes = [
            'video/mp4;codecs=avc1,mp4a.40.2',
            'video/webm;codecs=vp8,opus',
            'video/webm;codecs=vp9,opus',
            'video/webm'
          ];
          
          for (const mime of possibleMimes) {
            if (MediaRecorder.isTypeSupported(mime)) {
              options = { mimeType: mime };
              break;
            }
          }

          const recorder = new MediaRecorder(combinedStream, options);
          const chunks = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

          const recordPromise = new Promise(resolve => {
            recorder.onstop = () => resolve(new Blob(chunks, { type: options.mimeType }));
          });

          // Manual data slice to ensure data flows on Windows/Older browsers
          recorder.start(1000); 
          
          // Audio context resume in case it's suspended
          if (audioCtx.state === 'suspended') await audioCtx.resume();

          let isRecording = true;
          let currentSlideVisual = null;

          const renderLoop = () => {
            if (!isRecording) return;
            ctx.fillStyle = '#0f172a'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentSlideVisual) {
              const imageAreaW = 920;
              const sidebarW = 360;
              
              ctx.fillStyle = '#1e293b';
              ctx.fillRect(0, 0, imageAreaW, canvas.height);

              if (currentSlideVisual.img) {
                const img = currentSlideVisual.img;
                const scale = Math.min(imageAreaW / img.width, canvas.height / img.height);
                const w = img.width * scale;
                const h = img.height * scale;
                ctx.drawImage(img, (imageAreaW - w) / 2, (canvas.height - h) / 2, w, h);
              } else {
                ctx.fillStyle = '#f8fafc';
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(currentSlideVisual.text, imageAreaW / 2, canvas.height / 2);
              }

              ctx.strokeStyle = '#334155';
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.moveTo(imageAreaW, 0); ctx.lineTo(imageAreaW, canvas.height);
              ctx.stroke();

              if (currentSlideVisual.sentences && currentSlideVisual.duration > 0) {
                const elapsed = performance.now() - currentSlideVisual.startTime;
                const progress = Math.min(1, Math.max(0, elapsed / currentSlideVisual.duration));
                const totalSentences = currentSlideVisual.sentences.length;
                const visibleCount = Math.min(totalSentences, Math.floor(progress * totalSentences) + 1);

                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                let currentY = 40;
                const startX = imageAreaW + 30;
                const maxTextW = sidebarW - 60;

                for (let j = 0; j < totalSentences; j++) {
                  if (j < visibleCount) {
                    const isCurrent = j === visibleCount - 1;
                    ctx.fillStyle = isCurrent ? '#ffffff' : '#94a3b8';
                    ctx.font = (isCurrent ? 'bold ' : '') + '22px sans-serif';
                    
                    const words = currentSlideVisual.sentences[j].split(' ');
                    let line = '';
                    for(let n = 0; n < words.length; n++) {
                      const testLine = line + words[n] + ' ';
                      if (ctx.measureText(testLine).width > maxTextW && n > 0) {
                        ctx.fillText(line, startX, currentY);
                        line = words[n] + ' ';
                        currentY += 30;
                      } else { line = testLine; }
                    }
                    ctx.fillText(line, startX, currentY);
                    currentY += 40; 
                  }
                }
              }
            }
            requestAnimationFrame(renderLoop);
          };
          
          requestAnimationFrame(renderLoop);

          for (let i = 0; i < slides.length; i++) {
            const slide = slides[i];
            setCompilationProgress(`Processing slide ${i + 1} of ${slides.length}...`);
            
            const sentenceRegex = /[^.!?]+[.!?]+|\s*$/g;
            const sentences = (slide.script ? slide.script.match(sentenceRegex) : []) || [];
            if (sentences.length === 0 && slide.script) sentences.push(slide.script);

            let slideImg = null;
            if (slide.imagePreviewUrl) {
              slideImg = new Image();
              slideImg.src = slide.imagePreviewUrl;
              await new Promise(r => { slideImg.onload = r; slideImg.onerror = r; });
            }

            let audioDurationMs = 3000; 
            let audioBuffer = null;
            if (slide.audioBlob) {
              try {
                const arrayBuffer = await slide.audioBlob.arrayBuffer();
                audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                audioDurationMs = audioBuffer.duration * 1000;
              } catch (e) {}
            } else if (slide.script) {
              audioDurationMs = Math.max(3000, slide.script.length * 60);
            }

            currentSlideVisual = { 
              img: slideImg, text: `Slide ${i + 1}`, sentences, 
              duration: audioDurationMs, startTime: performance.now()
            };

            if (audioBuffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(dest);
                source.start();
                await new Promise(r => { source.onended = r; });
            } else {
                await new Promise(r => setTimeout(r, audioDurationMs));
            }
          }

          setCompilationProgress("Finalizing video file...");
          isRecording = false; 
          recorder.stop();
          const finalBlob = await recordPromise;
          const extension = finalBlob.type.includes('mp4') ? 'mp4' : 'webm';
          setFinalExtension(extension);
          setFinalVideoUrl(URL.createObjectURL(finalBlob));
          if (audioCtx.state !== 'closed') await audioCtx.close();

        } catch (err) {
          console.error(err);
          alert("Compilation failed.");
        } finally {
          setIsCompiling(false);
          setCompilationProgress("");
        }
      };

      if (view === 'home') {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6 text-slate-800">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100 text-center animate-in fade-in zoom-in duration-300">
              <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                <Sparkles className="text-white w-8 h-8" />
              </div>
              <h1 className="text-2xl font-bold text-slate-900 mb-3">Welcome to SlideCaster</h1>
              <p className="text-slate-600 mb-6 text-sm leading-relaxed">
                To use automatic slide script generation, please provide your Gemini API Key.
              </p>
              <div className="mb-8 text-left">
                <label className="block text-sm font-semibold text-slate-700 mb-2">Gemini API Key</label>
                <input 
                  type="password" 
                  value={userApiKey}
                  onChange={(e) => setUserApiKey(e.target.value)}
                  placeholder="AIzaSy..."
                  className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                />
              </div>
              <div className="flex flex-col gap-3">
                <button onClick={startWithAI} disabled={!userApiKey.trim()} className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white font-semibold py-3 rounded-xl transition-all">Save Key & Start</button>
                <button onClick={skipAI} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-3 rounded-xl transition-all">Skip AI (Manual)</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
            <div className="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-inner">
                  <VideoIcon className="text-white w-5 h-5" />
                </div>
                <h1 className="text-xl font-bold text-slate-900">SlideCaster</h1>
              </div>
              <div className="flex items-center gap-4 text-sm bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                <SettingsIcon className="w-4 h-4 text-slate-500" />
                <span className="text-slate-600 font-medium">Global Voice:</span>
                <select value={globalVoice} onChange={(e) => {
                  setGlobalVoice(e.target.value);
                  setSlides(slides.map(s => ({ ...s, voice: e.target.value })));
                }} className="bg-transparent font-semibold text-indigo-700 outline-none">
                  {VOICES.map(v => <option key={v} value={v}>{v}</option>)}
                </select>
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-6 py-8 flex-grow w-full">
            <div className="mb-8 bg-indigo-50 border border-indigo-100 rounded-2xl p-5 flex gap-4">
              <div className="mt-1 bg-indigo-100 w-8 h-8 rounded-full flex items-center justify-center">
                <UploadIcon className="w-4 h-4 text-indigo-600" />
              </div>
              <div>
                <h3 className="font-semibold text-indigo-900 mb-1">How it works</h3>
                <p className="text-sm text-indigo-800/80 mb-3">Upload your slide images, add scripts, and compile your video.</p>
                <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={handleBulkImageUpload} />
                <button onClick={() => fileInputRef.current?.click()} className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg flex items-center gap-2">
                  <PresentationIcon className="w-4 h-4" /> Bulk Upload Slide Images
                </button>
              </div>
            </div>

            <div className="space-y-6 mb-12">
              {slides.map((slide, index) => (
                <div key={slide.id} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col md:flex-row transition-all hover:shadow-md">
                  <div className="md:w-1/3 bg-slate-100 border-r border-slate-200 relative group min-h-[200px] flex items-center justify-center p-4">
                    {slide.imagePreviewUrl ? (
                      <>
                        <img src={slide.imagePreviewUrl} alt={`Slide ${index + 1}`} className="max-h-full max-w-full rounded shadow-sm object-contain" />
                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
                          <label className="cursor-pointer bg-white text-slate-800 text-sm font-medium px-4 py-2 rounded-lg shadow flex items-center gap-2 hover:bg-slate-50 transition-all">
                            <UploadIcon className="w-4 h-4" /> Change Image
                            <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(slide.id, e)} />
                          </label>
                        </div>
                      </>
                    ) : (
                      <label className="cursor-pointer w-full h-full min-h-[160px] border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center text-slate-500 hover:border-indigo-400 hover:text-indigo-600 transition-all">
                        <PresentationIcon className="w-8 h-8 mb-2 opacity-50" />
                        <span className="text-sm font-medium text-center">Upload Slide Image</span>
                        <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(slide.id, e)} />
                      </label>
                    )}
                    <div className="absolute top-3 left-3 bg-white/90 text-slate-700 text-xs font-bold px-2 py-1 rounded shadow-sm border border-slate-200/50">{index + 1}</div>
                  </div>

                  <div className="p-5 flex-1 flex flex-col">
                    <div className="flex justify-between items-center mb-2">
                      <label className="text-sm font-semibold text-slate-700 flex items-center gap-2"><MicIcon className="w-4 h-4 text-slate-400" /> Voiceover Script</label>
                      <div className="flex items-center gap-2">
                        <button onClick={() => autoGenerateScript(slide.id)} disabled={!slide.imagePreviewUrl || slide.isGeneratingScript || aiStatus !== 'ready'} className="text-xs font-medium bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-3 py-1.5 rounded-md flex items-center gap-1.5 transition-colors disabled:opacity-50">
                          {slide.isGeneratingScript ? <><LoaderIcon className="w-3 h-3 animate-spin"/> {slide.scriptGenerationProgress}</> : <><SparklesIcon className="w-3 h-3"/> AI Script</>}
                        </button>
                        <button onClick={() => handleRemoveSlide(slide.id)} className="text-slate-400 hover:text-red-500 transition-colors p-1"><TrashIcon className="w-4 h-4"/></button>
                      </div>
                    </div>
                    <textarea value={slide.script} onChange={(e) => updateSlide(slide.id, { script: e.target.value })} className="w-full flex-1 min-h-[100px] bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-400" placeholder="Type the script here..."/>
                    <div className="mt-4 flex flex-wrap items-center justify-between gap-4 border-t border-slate-100 pt-4">
                      <select value={slide.voice} onChange={(e) => updateSlide(slide.id, { voice: e.target.value })} className="text-sm bg-white border border-slate-200 rounded-lg px-2 py-1.5 outline-none focus:ring-2 focus:ring-indigo-500">
                        {VOICES.map(v => <option key={v} value={v}>{v}</option>)}
                      </select>
                      <div className="flex items-center gap-2">
                        {slide.audioUrl && <button onClick={() => playAudio(slide.audioUrl)} className="w-9 h-9 flex items-center justify-center rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200"><PlayIcon className="w-4 h-4 ml-0.5"/></button>}
                        <button onClick={() => generateAudioForSlide(slide.id)} disabled={!(slide.script || "").trim() || slide.isGenerating} className="bg-slate-900 hover:bg-slate-800 disabled:bg-slate-200 disabled:text-slate-400 text-white text-sm font-medium px-4 py-2 rounded-lg transition-all flex items-center gap-2">
                          {slide.isGenerating ? <><LoaderIcon className="w-4 h-4 animate-spin"/> Generating...</> : <><MicIcon className="w-4 h-4"/> Generate Voice</>}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
              <button onClick={handleAddSlide} className="w-full py-4 border-2 border-dashed border-slate-300 rounded-2xl text-slate-500 font-medium flex items-center justify-center gap-2 hover:bg-slate-50 hover:border-indigo-400 hover:text-indigo-600 transition-all">
                <PlusIcon className="w-5 h-5"/> Add Another Slide
              </button>
            </div>
          </main>

          <footer className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-lg z-20">
            <div className="max-w-5xl mx-auto flex items-center justify-between gap-4">
              <div className="text-sm text-slate-500 font-medium">Total Slides: <span className="text-slate-900">{slides.length}</span></div>
              <button onClick={compileVideo} disabled={isCompiling || slides.length === 0} className="bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 disabled:from-slate-300 disabled:to-slate-300 text-white font-semibold px-8 py-3 rounded-xl shadow-lg transition-all flex items-center gap-2">
                {isCompiling ? <><LoaderIcon className="w-5 h-5 animate-spin"/> {compilationProgress}</> : <><VideoIcon className="w-5 h-5"/> Compile Video</>}
              </button>
            </div>
          </footer>

          {finalVideoUrl && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
              <div className="bg-white rounded-3xl max-w-4xl w-full shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className="p-6 border-b border-slate-100 flex justify-between items-center text-slate-900">
                  <h2 className="text-2xl font-bold">Your Video is Ready!</h2>
                  <button onClick={() => setFinalVideoUrl(null)} className="text-slate-400 hover:text-slate-600 p-2"><XIcon className="w-5 h-5"/></button>
                </div>
                <div className="bg-slate-100 p-6 flex justify-center">
                  <video 
                    key={finalVideoUrl}
                    src={finalVideoUrl} 
                    controls 
                    autoPlay
                    playsInline
                    className="max-h-[50vh] rounded-xl shadow-md bg-black"
                  />
                </div>
                <div className="p-6 flex justify-end gap-3 bg-slate-50 border-t border-slate-100">
                  <button onClick={() => setFinalVideoUrl(null)} className="px-5 py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-200 transition-all">Back to Editor</button>
                  <a href={finalVideoUrl} download={`Video.${finalExtension}`} className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-xl flex items-center gap-2 shadow-md transition-all"><DownloadIcon className="w-5 h-5"/> Download Video</a>
                </div>
              </div>
            </div>
          )}
          <div className="h-24"></div> 
        </div>
      );
    }

    class AppErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-10 bg-red-50 text-red-900 h-screen font-sans">
              <h1 className="text-2xl font-bold">Application Crash Detected</h1>
              <pre className="mt-4 p-4 bg-white border border-red-200 rounded overflow-auto">{this.state.error && this.state.error.toString()}</pre>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppErrorBoundary><SlideCasterApp /></AppErrorBoundary>);
  </script>
</body>
</html>
